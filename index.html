
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cesta — sua lista de compras</title>
<style>
  /* ── Design Tokens ───────────────────────────────────────────────── */
  :root{
    --g0:#071a10; --g1:#0f2e1c; --g2:#1a4a2e; --g3:#256640;
    --g4:#2f8152; --g5:#52a870; --g6:#86c99a; --g7:#c4e8cf;
    --g8:#e8f5ec; --g9:#f4fbf6;
    --amber:#f5a623; --amber-dk:#d4841a;
    --red:#c0392b; --red-lt:#fdecea;
    --ink:#0a1f12; --muted:#5a7564; --line:#d4e8da;
    --white:#fff; --bg:#f0f7f2;
    --r-sm:10px; --r-md:16px; --r-lg:22px; --r-xl:28px;
    --sh-sm:0 1px 3px rgba(7,26,16,.07),0 4px 12px rgba(7,26,16,.08);
    --sh-md:0 2px 8px rgba(7,26,16,.08),0 12px 28px rgba(7,26,16,.10);
    --sh-lg:0 8px 24px rgba(7,26,16,.12),0 24px 48px rgba(7,26,16,.12);
    --nav-h:64px; --tab-h:62px;
    --font-sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;
    --font-serif:Georgia,"Times New Roman",serif;
  }

  /* ── Reset ───────────────────────────────────────────────────────── */
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
  body{font-family:var(--font-sans);background:var(--bg);color:var(--ink);line-height:1.5;min-height:100vh;max-width:480px;margin:0 auto;overflow-x:hidden}
  h1,h2,h3{font-family:var(--font-serif);letter-spacing:-.02em;line-height:1.15}
  button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
  input,select,textarea{font-family:inherit;font-size:16px}
  a{color:var(--g4);text-decoration:none}

  /* ── Loading ─────────────────────────────────────────────────────── */
  .carregando{position:fixed;inset:0;background:var(--g0);display:grid;place-items:center;z-index:300}
  .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--g6);border-radius:50%;animation:gira 1s linear infinite}
  @keyframes gira{to{transform:rotate(360deg)}}

  /* ── Animations ──────────────────────────────────────────────────── */
  @keyframes sobe{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes pulso{0%{box-shadow:0 0 0 0 rgba(82,168,112,.6)}70%{box-shadow:0 0 0 7px rgba(82,168,112,0)}100%{box-shadow:0 0 0 0 rgba(82,168,112,0)}}
  .escondido{display:none!important}

  /* ── Top Nav ─────────────────────────────────────────────────────── */
  .topo{
    background:var(--g0);
    color:#d4edda;
    height:var(--nav-h);
    padding:0 16px;
    display:flex;align-items:center;gap:10px;
    position:sticky;top:0;z-index:50;
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  .marca{display:flex;align-items:center;gap:9px;font-weight:700;font-size:18px;font-family:var(--font-serif);letter-spacing:-.02em;color:#fff}
  .marca .cesta{
    width:34px;height:34px;border-radius:9px;
    background:linear-gradient(140deg,var(--g5),var(--g3));
    display:grid;place-items:center;font-size:18px;
    box-shadow:0 2px 8px rgba(0,0,0,.3);
    flex-shrink:0;
  }
  .topo .dir{margin-left:auto;display:flex;align-items:center;gap:8px}
  .ao-vivo{font-size:10.5px;color:var(--g6);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .ao-vivo .pt{width:6px;height:6px;border-radius:50%;background:var(--g6);animation:pulso 1.8s infinite;flex-shrink:0}
  .quem{font-size:11px;color:rgba(212,237,218,.7);text-align:right;line-height:1.3}
  .quem b{display:block;font-size:12.5px;color:#d4edda;font-weight:700}
  .btn-sair{background:rgba(255,255,255,.09);color:#d4edda;padding:7px 11px;border-radius:8px;font-size:12px;font-weight:600;letter-spacing:.01em;transition:background .15s}
  .btn-sair:active{background:rgba(255,255,255,.18)}
  .loc-btn{
    display:flex;align-items:center;gap:5px;
    background:rgba(255,255,255,.09);color:#d4edda;
    padding:7px 11px;border-radius:8px;font-size:12px;font-weight:600;
    max-width:36vw;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
    transition:background .15s;flex-shrink:0;
  }
  .loc-btn:active{background:rgba(255,255,255,.18)}

  /* ── Tab Bar ─────────────────────────────────────────────────────── */
  .barra-secoes{
    position:sticky;top:var(--nav-h);z-index:40;
    background:var(--white);
    border-bottom:1px solid var(--line);
    display:flex;padding:0;
    box-shadow:0 2px 8px rgba(7,26,16,.06);
  }
  .barra-secoes button{
    flex:1;padding:0;height:var(--tab-h);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    font-size:10.5px;font-weight:600;color:var(--muted);letter-spacing:.02em;
    border-bottom:2.5px solid transparent;transition:.15s;
    position:relative;
  }
  .barra-secoes button .tab-ic{font-size:20px;line-height:1;transition:.15s}
  .barra-secoes button.on{color:var(--g2);border-bottom-color:var(--g4)}
  .barra-secoes button.on .tab-ic{transform:scale(1.1)}
  .barra-secoes button .badge{
    position:absolute;top:8px;right:calc(50% - 18px);
    min-width:18px;height:18px;padding:0 5px;
    background:var(--red);color:#fff;border-radius:9px;
    font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;
  }

  /* ── Main ────────────────────────────────────────────────────────── */
  main{padding:0 0 calc(var(--tab-h) + 24px)}

  /* ── Generic Button ──────────────────────────────────────────────── */
  .btn{
    background:var(--g3);color:#fff;
    padding:14px 20px;border-radius:var(--r-md);
    font-weight:700;font-size:15px;letter-spacing:.01em;
    transition:.15s;display:inline-flex;align-items:center;gap:8px;justify-content:center;
    box-shadow:0 2px 8px rgba(15,65,40,.25);
  }
  .btn:active{opacity:.85;transform:scale(.98)}
  .btn.full{width:100%}
  .btn.fantasma{background:transparent;color:var(--g3);box-shadow:inset 0 0 0 1.5px var(--g5)}
  .btn.fantasma:active{background:var(--g9)}
  .btn.peq{padding:8px 14px;font-size:13px;border-radius:var(--r-sm)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

  /* ── Card / Field ────────────────────────────────────────────────── */
  .cartao{background:var(--white);border-radius:var(--r-lg);box-shadow:var(--sh-md);padding:22px}
  .campo{margin-bottom:14px}
  .campo label{display:block;font-size:12px;font-weight:700;color:var(--g2);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
  .campo input{
    width:100%;padding:13px 15px;
    border:1.5px solid var(--line);border-radius:var(--r-sm);
    background:var(--g9);color:var(--ink);font-size:15px;
    transition:.15s;
  }
  .campo input:focus{outline:none;border-color:var(--g4);background:#fff;box-shadow:0 0 0 3px rgba(47,129,82,.12)}

  /* ── Portal / Login ──────────────────────────────────────────────── */
  #tela-portal.portal{
    display:flex;flex-direction:column;min-height:100vh;padding:0;
    background:var(--g0);
  }
  .portal-wrap{
    flex:1;width:100%;padding:20px 20px 24px;
    display:flex;flex-direction:column;gap:16px;
  }
  .hero-oferta{
    border-radius:var(--r-xl);overflow:hidden;position:relative;
    min-height:200px;display:flex;flex-direction:column;justify-content:flex-end;
    color:#fff;padding:22px;
    background:linear-gradient(140deg,var(--g3),var(--g1));
    box-shadow:0 16px 40px rgba(7,26,16,.4);
  }
  .hero-oferta .bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
  .hero-oferta .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(7,26,16,.1),rgba(7,26,16,.82))}
  .hero-oferta>*{position:relative;z-index:1}
  .hero-oferta .et{
    display:inline-flex;align-items:center;gap:6px;align-self:flex-start;
    background:var(--amber);color:#3a1800;
    font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
    padding:5px 11px;border-radius:20px;margin-bottom:10px;
  }
  .hero-oferta h2{font-size:24px;margin-bottom:5px;text-shadow:0 1px 8px rgba(0,0,0,.4)}
  .hero-oferta p{font-size:13.5px;opacity:.9;line-height:1.4}
  .hero-oferta .meta{margin-top:10px;font-size:11.5px;opacity:.85;display:flex;gap:14px;flex-wrap:wrap}

  /* login card */
  .portal-caixa{width:100%}
  .portal-cabeca{text-align:center;margin-bottom:20px}
  .portal-cabeca .sel{
    width:60px;height:60px;border-radius:16px;margin:0 auto 12px;
    display:grid;place-items:center;font-size:28px;
    background:linear-gradient(140deg,var(--g5),var(--g3));
    box-shadow:0 8px 20px rgba(7,26,16,.35);
  }
  .portal-cabeca h1{font-size:28px;color:#fff}
  .portal-cabeca p{color:rgba(212,237,218,.65);margin-top:4px;font-size:13.5px}
  .abas{display:flex;background:rgba(255,255,255,.08);border-radius:12px;padding:4px;margin-bottom:18px;gap:4px}
  .abas button{flex:1;padding:10px;border-radius:9px;font-size:13.5px;font-weight:600;color:rgba(212,237,218,.6)}
  .abas button.on{background:rgba(255,255,255,.15);color:#fff}
  .cartao-portal{background:rgba(255,255,255,.07);border-radius:var(--r-lg);border:1px solid rgba(255,255,255,.1);padding:22px;backdrop-filter:blur(10px)}
  .cartao-portal .campo label{color:rgba(212,237,218,.8)}
  .cartao-portal .campo input{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12);color:#fff}
  .cartao-portal .campo input::placeholder{color:rgba(212,237,218,.35)}
  .cartao-portal .campo input:focus{border-color:var(--g5);background:rgba(255,255,255,.12);box-shadow:0 0 0 3px rgba(82,168,112,.2)}
  .cartao-portal .btn{background:var(--g4);box-shadow:0 4px 16px rgba(47,129,82,.4)}
  .dica-login{font-size:11.5px;color:rgba(212,237,218,.45);text-align:center;margin-top:14px}

  /* carousel portal */
  .car-faixa{background:rgba(255,255,255,.04);padding:14px 0 18px;border-top:1px solid rgba(255,255,255,.07)}
  .car-cab{padding:0 20px 9px;display:flex;align-items:center;justify-content:space-between}
  .car-cab .t{font-size:11px;font-weight:800;color:rgba(212,237,218,.55);letter-spacing:.07em;text-transform:uppercase}
  .car-cab .nav{display:flex;gap:6px}
  .car-cab .nav button{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.1);color:var(--g6);font-size:15px;display:grid;place-items:center}
  .car-janela{overflow:hidden;padding:4px 20px 6px}
  .car-trilho{display:flex;gap:12px;transition:transform .5s cubic-bezier(.4,0,.2,1);will-change:transform}
  .car-card{
    flex:0 0 76vw;max-width:290px;
    border-radius:var(--r-md);overflow:hidden;
    background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.1);
    position:relative;min-height:110px;
    display:flex;flex-direction:column;justify-content:flex-end;
    color:#fff;padding:14px;
  }
  .car-card.patro{border-color:rgba(112,72,232,.35)}
  .car-card .bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
  .car-card.tem-foto .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(transparent 30%,rgba(0,0,0,.75))}
  .car-card>*{position:relative;z-index:1}
  .car-card .tagp{align-self:flex-start;font-size:9.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;padding:3px 9px;border-radius:20px;margin-bottom:auto}
  .car-card .tagp.of{background:var(--amber);color:#3a1800}
  .car-card .tagp.pa{background:#7048e8;color:#fff}
  .car-card h4{font-size:14.5px;margin:8px 0 3px;line-height:1.25}
  .car-card p{font-size:12px;opacity:.85;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .car-card .v{font-size:11px;opacity:.7;margin-top:4px}

  /* ── Section: Comprar ────────────────────────────────────────────── */
  .comprar-inner{padding:16px 16px 0}
  .busca-cx{position:relative;margin-bottom:14px}
  .busca-cx input{
    width:100%;padding:13px 15px 13px 42px;
    border:1.5px solid var(--line);border-radius:var(--r-md);
    background:#fff;font-size:15px;color:var(--ink);
    box-shadow:var(--sh-sm);
  }
  .busca-cx input:focus{outline:none;border-color:var(--g4);box-shadow:0 0 0 3px rgba(47,129,82,.12)}
  .busca-cx .lupa{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted);pointer-events:none}
  .yt-player{margin-top:10px}
  .yt-player iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:12px;display:block}
  .filtros{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;margin-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .filtros::-webkit-scrollbar{display:none}
  .chip{
    white-space:nowrap;padding:8px 15px;border-radius:20px;
    font-size:12.5px;font-weight:700;letter-spacing:.02em;
    background:#fff;color:var(--muted);
    box-shadow:var(--sh-sm);flex-shrink:0;
    transition:.12s;
  }
  .chip.on{background:var(--g2);color:#fff;box-shadow:0 2px 8px rgba(26,74,46,.3)}
  .filtros-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}

  /* Banners */
  .banners{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
  .banner{
    border-radius:var(--r-lg);padding:18px 20px;color:#fff;
    position:relative;overflow:hidden;min-height:120px;
    display:flex;flex-direction:column;justify-content:flex-end;
    background:linear-gradient(130deg,#e08c0a,#c26900);
    box-shadow:0 6px 18px rgba(192,105,0,.3);
  }
  .banner.verde{background:linear-gradient(130deg,var(--g5),var(--g2));box-shadow:0 6px 18px rgba(26,74,46,.3)}
  .banner::after{content:"";position:absolute;right:-20px;top:-20px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.12)}
  .banner::before{content:"";position:absolute;right:12px;bottom:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.08)}
  .banner .et{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;opacity:.8;position:relative;z-index:1}
  .banner h3{font-size:20px;margin:5px 0 3px;position:relative;z-index:1;text-shadow:0 1px 6px rgba(0,0,0,.2)}
  .banner p{font-size:13px;position:relative;z-index:1;opacity:.92;max-width:82%}
  .banner .merc{font-size:11.5px;margin-top:8px;font-weight:700;position:relative;z-index:1;opacity:.9}
  .banner .val{position:absolute;bottom:12px;right:16px;font-size:10.5px;font-weight:600;opacity:.75;z-index:1}

  /* Product Grid */
  .grade{display:grid;gap:12px}
  .grade.col3{grid-template-columns:1fr 1fr}
  .prod{
    background:#fff;border-radius:var(--r-md);
    box-shadow:var(--sh-sm);overflow:hidden;
    display:flex;flex-direction:column;position:relative;
    transition:.15s;
  }
  .prod:active{transform:scale(.98);box-shadow:var(--sh-sm)}
  .prod .foto{
    height:108px;background:var(--g9);
    display:grid;place-items:center;font-size:46px;
    position:relative;
  }
  .prod .foto::after{content:"";position:absolute;bottom:0;left:0;right:0;height:24px;background:linear-gradient(transparent,rgba(0,0,0,.04))}
  .prod .selo{
    position:absolute;top:8px;left:8px;
    background:var(--red);color:#fff;
    font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;
    box-shadow:0 2px 6px rgba(192,57,43,.4);
    z-index:1;
  }
  .prod .conteudo{padding:11px 12px;flex:1;display:flex;flex-direction:column}
  .prod .pnome{font-weight:700;font-size:13.5px;color:var(--g1);line-height:1.3}
  .prod .pcat{font-size:10.5px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
  .prod .precos{margin-top:auto;padding-top:8px;display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
  .prod .pde{font-size:12px;color:var(--muted);text-decoration:line-through}
  .prod .ppor{font-size:18px;font-weight:800;color:var(--g2);font-family:var(--font-serif)}
  .prod .ppor.promo{color:var(--red)}
  .prod .add{
    margin:0 12px 12px;
    background:var(--g9);color:var(--g2);
    border-radius:var(--r-sm);padding:9px;
    font-weight:700;font-size:13px;
    transition:.15s;border:1.5px solid var(--line);
  }
  .prod .add:active{background:var(--g3);color:#fff;border-color:var(--g3)}
  .prod .add.no-carrinho{background:var(--g2);color:#fff;border-color:var(--g2)}

  /* ── Lista / Cart ────────────────────────────────────────────────── */
  .lista-inner{padding:16px}
  .titulo-secao{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}
  .titulo-secao h2{font-size:21px;color:var(--g1)}
  .titulo-secao .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .item-cart{
    background:#fff;border-radius:var(--r-md);
    box-shadow:var(--sh-sm);padding:13px 14px;
    display:flex;align-items:center;gap:11px;
    transition:.15s;
  }
  .item-cart.marcado{opacity:.5}
  .item-cart.marcado .ic-nome{text-decoration:line-through;color:var(--muted)}
  .check{
    width:24px;height:24px;border-radius:7px;
    border:2px solid var(--g5);flex-shrink:0;
    display:grid;place-items:center;cursor:pointer;
    background:#fff;transition:.12s;font-size:13px;color:transparent;
  }
  .check.on{background:var(--g3);border-color:var(--g3);color:#fff}
  .item-cart .emoji{font-size:24px;flex-shrink:0}
  .item-cart .corpo{flex:1;min-width:0}
  .item-cart .ic-nome{font-weight:700;color:var(--g1);font-size:14px;line-height:1.3}
  .item-cart .ic-meta{font-size:11.5px;color:var(--muted);margin-top:1px}
  .qtd{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .qtd button{
    width:28px;height:28px;border-radius:8px;
    background:var(--g9);color:var(--g2);
    font-weight:700;font-size:16px;line-height:1;
    display:grid;place-items:center;
  }
  .qtd button:active{background:var(--g7)}
  .qtd span{min-width:20px;text-align:center;font-weight:700;font-size:14px;color:var(--g1)}
  .item-cart .preco-l{font-weight:700;color:var(--g2);font-size:13.5px;min-width:60px;text-align:right;flex-shrink:0}
  .item-cart .lixo{color:var(--muted);font-size:17px;padding:4px;flex-shrink:0}
  .item-cart .lixo:active{color:var(--red)}
  .merc-label{font-size:12px;font-weight:800;color:var(--g3);letter-spacing:.04em;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:6px}
  .resumo{
    background:var(--g0);color:#d4edda;
    border-radius:var(--r-lg);padding:18px 20px;
    margin-top:16px;
  }
  .resumo .l{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:7px;opacity:.8}
  .resumo .total{
    font-size:22px;font-weight:800;font-family:var(--font-serif);
    display:flex;justify-content:space-between;align-items:baseline;
    border-top:1px solid rgba(255,255,255,.12);padding-top:12px;margin-top:8px;
    color:#fff;
  }
  .resumo .botoes{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}

  /* ── Histórico ────────────────────────────────────────────────────── */
  .historico-inner{padding:16px}
  .hist-cartao{background:#fff;border-radius:var(--r-md);box-shadow:var(--sh-sm);overflow:hidden;margin-bottom:10px}
  .hist-cabeca{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer}
  .hist-cabeca:active{background:var(--g9)}
  .hist-cabeca .data{font-weight:700;color:var(--g1);font-size:14px}
  .hist-cabeca .resumo-h{font-size:11.5px;color:var(--muted);margin-top:2px}
  .hist-cabeca .vtotal{font-weight:800;color:var(--g3);font-family:var(--font-serif);font-size:16px;white-space:nowrap}
  .hist-itens{padding:0 16px;max-height:0;overflow:hidden;transition:.2s}
  .hist-itens.aberto{padding:4px 16px 14px;max-height:1600px}
  .hist-itens .li{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px solid var(--g8);color:var(--ink)}
  .hist-itens .li:last-child{border-bottom:none}

  /* ── Recomendação ────────────────────────────────────────────────── */
  .reco{
    border-radius:var(--r-lg);padding:18px 20px;color:#fff;
    background:linear-gradient(140deg,var(--g4),var(--g1));
    box-shadow:0 10px 28px rgba(7,26,16,.25);margin-bottom:16px;
  }
  .reco .et{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;opacity:.8}
  .reco h3{font-size:22px;margin:5px 0 3px}
  .reco .cob{font-size:13px;opacity:.88}
  .reco .linhas{display:flex;gap:20px;flex-wrap:wrap;margin-top:12px}
  .reco .bloco .n{font-size:20px;font-weight:800;font-family:var(--font-serif)}
  .reco .bloco .r{font-size:11px;opacity:.8}
  .reco .eco{margin-top:12px;background:rgba(255,255,255,.14);border-radius:10px;padding:8px 12px;font-size:13px}
  .reco .btn-mapa{margin-top:12px;background:#fff;color:var(--g2);font-weight:700;border-radius:var(--r-sm);padding:10px 16px;font-size:13.5px;display:inline-flex;align-items:center;gap:6px}
  .comp{background:#fff;border-radius:var(--r-md);box-shadow:var(--sh-sm);overflow:hidden;margin-bottom:16px}
  .comp-tit{padding:12px 14px 4px;font-weight:700;color:var(--g2);font-size:14px;letter-spacing:.01em}
  .comp-linha{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid var(--g8)}
  .comp-linha:last-child{border-bottom:none}
  .comp-linha.melhor{background:#edf8f1}
  .comp-linha .pos{width:26px;height:26px;border-radius:50%;background:var(--g9);display:grid;place-items:center;font-size:12px;font-weight:800;color:var(--g2);flex-shrink:0}
  .comp-linha.melhor .pos{background:var(--g3);color:#fff}
  .comp-linha .corpo{flex:1;min-width:0}
  .comp-linha .corpo b{color:var(--g1);font-size:14px}
  .comp-linha .corpo .d{font-size:11px;color:var(--muted)}
  .comp-linha .tot .v{font-size:15px;font-weight:800;color:var(--g2)}
  .comp-linha .tot .s{font-size:10.5px;color:var(--muted)}

  /* ── Empty State ─────────────────────────────────────────────────── */
  .vazio{text-align:center;padding:48px 20px;color:var(--muted)}
  .vazio .ic{font-size:44px;opacity:.5;margin-bottom:12px}
  .vazio b{display:block;font-size:16px;color:var(--g2);margin-bottom:6px}
  .vazio p{font-size:14px}
  .vazio .btn{margin-top:18px}

  /* ── Modal ───────────────────────────────────────────────────────── */
  .modal-fundo{position:fixed;inset:0;background:rgba(7,26,16,.6);display:none;place-items:end center;z-index:100;backdrop-filter:blur(3px)}
  .modal-fundo.on{display:grid}
  .modal{background:#fff;border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:480px;box-shadow:0 -8px 40px rgba(0,0,0,.25);animation:sobe .25s}
  .modal-cabeca{padding:18px 20px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .modal-cabeca h3{font-size:18px;color:var(--g1)}
  .modal-cabeca .x{font-size:26px;color:var(--muted);line-height:1;padding:2px}
  .modal-corpo{padding:20px}
  .modal-pe{padding:0 20px 20px;display:flex;gap:10px;justify-content:flex-end}
  .loc-opt .ou{text-align:center;color:var(--muted);font-size:12px;margin:14px 0}

  /* ── Toast ───────────────────────────────────────────────────────── */
  .toast-area{position:fixed;top:calc(var(--nav-h) + 10px);left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:90%;max-width:360px}
  .toast{
    background:var(--g0);color:#d4edda;
    padding:12px 18px;border-radius:var(--r-md);
    font-size:13.5px;font-weight:600;
    box-shadow:0 8px 24px rgba(0,0,0,.3);
    animation:sobe .25s;display:flex;align-items:center;gap:8px;
    width:100%;
  }
  .toast.erro{background:var(--red)}

  /* ── Rodapé patrocinado ───────────────────────────────────────────── */
  .rodape-patro{margin:20px 0 0;border-top:1px solid var(--line);padding-top:12px}
  .rodape-patro .et-rod{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#7048e8;padding:0 16px 6px}

  /* ── Tags/badges ────────────────────────────────────────────────── */
  .tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px}
  .tag.promo{background:var(--red-lt);color:var(--red)}
  


  /* ── OTIMIZAÇÃO PARA APP MOBILE NATIVO ──────────────────────────── */
  
  /* Reset e base otimizada */
  body{
    font-family:var(--font-sans);
    background:var(--bg);
    color:var(--ink);
    line-height:1.5;
    min-height:100vh;
    width:100%;
    max-width:100%;
    margin:0;
    padding:0;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
  }
  
  /* Barra de navegação otimizada */
  .topo{
    background:var(--g0);
    color:#d4edda;
    height:56px;
    padding:0 12px;
    display:flex;
    align-items:center;
    gap:8px;
    position:sticky;
    top:0;
    z-index:50;
    border-bottom:1px solid rgba(255,255,255,.06);
    flex-wrap:nowrap;
  }
  
  .marca{
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:700;
    font-size:16px;
    font-family:var(--font-serif);
    letter-spacing:-.02em;
    color:#fff;
    flex-shrink:0;
  }
  
  .marca .cesta{
    width:32px;
    height:32px;
    border-radius:8px;
    background:linear-gradient(140deg,var(--g5),var(--g3));
    display:grid;
    place-items:center;
    font-size:16px;
    box-shadow:0 2px 8px rgba(0,0,0,.3);
    flex-shrink:0;
  }
  
  .topo .dir{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:6px;
    flex-wrap:nowrap;
  }
  
  .ao-vivo{
    font-size:10px;
    color:var(--g6);
    display:inline-flex;
    align-items:center;
    gap:4px;
    white-space:nowrap;
  }
  
  .ao-vivo .pt{
    width:5px;
    height:5px;
    border-radius:50%;
    background:var(--g6);
    animation:pulso 1.8s infinite;
    flex-shrink:0;
  }
  
  .quem{
    font-size:10px;
    color:rgba(212,237,218,.7);
    text-align:right;
    line-height:1.2;
    display:none;
  }
  
  .quem b{
    display:block;
    font-size:11px;
    color:#d4edda;
    font-weight:700;
  }
  
  .btn-sair{
    background:rgba(255,255,255,.12);
    color:#d4edda;
    padding:6px 10px;
    border-radius:6px;
    font-size:11px;
    font-weight:600;
    letter-spacing:.01em;
    transition:background .15s;
    min-height:32px;
    cursor:pointer;
    border:none;
  }
  
  .btn-sair:active{
    background:rgba(255,255,255,.2);
  }
  
  .loc-btn{
    display:flex;
    align-items:center;
    gap:4px;
    background:rgba(255,255,255,.12);
    color:#d4edda;
    padding:6px 10px;
    border-radius:6px;
    font-size:11px;
    font-weight:600;
    max-width:35vw;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
    transition:background .15s;
    flex-shrink:1;
    cursor:pointer;
    border:none;
    min-height:32px;
  }
  
  .loc-btn:active{
    background:rgba(255,255,255,.2);
  }
  
  /* Barra de abas otimizada */
  .barra-secoes{
    position:sticky;
    top:56px;
    z-index:40;
    background:var(--white);
    border-bottom:1px solid var(--line);
    display:flex;
    padding:0;
    box-shadow:0 1px 4px rgba(7,26,16,.04);
  }
  
  .barra-secoes button{
    flex:1;
    padding:0;
    height:56px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:3px;
    font-size:11px;
    font-weight:600;
    color:var(--muted);
    letter-spacing:.02em;
    border-bottom:3px solid transparent;
    transition:all .2s ease;
    position:relative;
    cursor:pointer;
    border:none;
    background:none;
    -webkit-user-select:none;
  }
  
  .barra-secoes button .tab-ic{
    font-size:24px;
    line-height:1;
    transition:transform .2s ease;
  }
  
  .barra-secoes button.on{
    color:var(--g2);
    border-bottom-color:var(--g4);
  }
  
  .barra-secoes button.on .tab-ic{
    transform:scale(1.15);
  }
  
  .barra-secoes button .badge{
    position:absolute;
    top:6px;
    right:calc(50% - 20px);
    min-width:20px;
    height:20px;
    padding:0 5px;
    background:var(--red);
    color:#fff;
    border-radius:10px;
    font-size:9px;
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  
  /* Main content */
  main{
    padding:0 0 calc(56px + 16px);
  }
  
  /* Botões otimizados */
  .btn{
    background:var(--g3);
    color:#fff;
    padding:12px 18px;
    border-radius:10px;
    font-weight:700;
    font-size:14px;
    letter-spacing:.01em;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:8px;
    justify-content:center;
    box-shadow:0 2px 8px rgba(15,65,40,.25);
    border:none;
    cursor:pointer;
    min-height:44px;
    -webkit-user-select:none;
  }
  
  .btn:active{
    opacity:.9;
    transform:scale(.98);
    box-shadow:0 1px 4px rgba(15,65,40,.15);
  }
  
  .btn.full{
    width:100%;
  }
  
  .btn.fantasma{
    background:transparent;
    color:var(--g3);
    box-shadow:inset 0 0 0 1.5px var(--g5);
  }
  
  .btn.fantasma:active{
    background:var(--g9);
  }
  
  .btn.peq{
    padding:8px 12px;
    font-size:12px;
    border-radius:8px;
    min-height:36px;
  }
  
  .btn:disabled{
    opacity:.4;
    cursor:not-allowed;
    transform:none;
  }
  
  /* Campos de entrada otimizados */
  .campo{
    margin-bottom:14px;
  }
  
  .campo label{
    display:block;
    font-size:11px;
    font-weight:700;
    color:var(--g2);
    margin-bottom:6px;
    letter-spacing:.04em;
    text-transform:uppercase;
  }
  
  .campo input{
    width:100%;
    padding:12px 14px;
    border:1.5px solid var(--line);
    border-radius:10px;
    background:var(--g9);
    color:var(--ink);
    font-size:16px;
    transition:all .15s ease;
    min-height:44px;
    cursor:text;
    -webkit-appearance:none;
    appearance:none;
  }
  
  .campo input:focus{
    outline:none;
    border-color:var(--g4);
    background:#fff;
    box-shadow:0 0 0 3px rgba(47,129,82,.12);
  }
  
  .campo input::placeholder{
    color:var(--muted);
  }
  
  /* Grade de produtos otimizada */
  .grade{
    display:grid;
    gap:12px;
  }
  
  .grade.col3{
    grid-template-columns:1fr 1fr;
  }
  
  /* Card de produto otimizado */
  .prod{
    background:#fff;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(7,26,16,.06);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    position:relative;
    transition:all .15s ease;
    min-height:260px;
  }
  
  .prod:active{
    transform:translateY(-2px);
    box-shadow:0 4px 12px rgba(7,26,16,.12);
  }
  
  .prod .foto{
    height:130px;
    background:var(--g9);
    display:grid;
    place-items:center;
    font-size:52px;
    position:relative;
    flex-shrink:0;
  }
  
  .prod .foto::after{
    content:"";
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    height:20px;
    background:linear-gradient(transparent,rgba(0,0,0,.02));
  }
  
  .prod .selo{
    position:absolute;
    top:8px;
    left:8px;
    background:var(--red);
    color:#fff;
    font-size:10px;
    font-weight:800;
    padding:4px 8px;
    border-radius:20px;
    box-shadow:0 2px 6px rgba(192,57,43,.4);
    z-index:1;
  }
  
  .prod .conteudo{
    padding:12px 12px;
    flex:1;
    display:flex;
    flex-direction:column;
  }
  
  .prod .pnome{
    font-weight:700;
    font-size:13px;
    color:var(--g1);
    line-height:1.3;
  }
  
  .prod .pcat{
    font-size:10px;
    color:var(--muted);
    margin-top:3px;
    text-transform:uppercase;
    letter-spacing:.05em;
  }
  
  .prod .precos{
    margin-top:auto;
    padding-top:8px;
    display:flex;
    align-items:baseline;
    gap:6px;
    flex-wrap:wrap;
  }
  
  .prod .pde{
    font-size:11px;
    color:var(--muted);
    text-decoration:line-through;
  }
  
  .prod .ppor{
    font-size:16px;
    font-weight:800;
    color:var(--g2);
    font-family:var(--font-serif);
  }
  
  .prod .ppor.promo{
    color:var(--red);
  }
  
  .prod .add{
    margin:0 12px 12px;
    background:var(--g9);
    color:var(--g2);
    border-radius:8px;
    padding:10px 12px;
    font-weight:700;
    font-size:13px;
    transition:all .15s ease;
    border:1.5px solid var(--line);
    cursor:pointer;
    min-height:40px;
    -webkit-user-select:none;
  }
  
  .prod .add:active{
    background:var(--g3);
    color:#fff;
    border-color:var(--g3);
    transform:scale(.98);
  }
  
  .prod .add.no-carrinho{
    background:var(--g2);
    color:#fff;
    border-color:var(--g2);
  }
  
  /* Seção de compra otimizada */
  .comprar-inner{
    padding:12px 12px 0;
  }
  
  .busca-cx{
    position:relative;
    margin-bottom:14px;
  }
  
  .busca-cx input{
    width:100%;
    padding:12px 14px 12px 40px;
    border:1.5px solid var(--line);
    border-radius:10px;
    background:#fff;
    font-size:16px;
    color:var(--ink);
    box-shadow:0 1px 4px rgba(7,26,16,.04);
    min-height:44px;
  }
  
  .busca-cx input:focus{
    outline:none;
    border-color:var(--g4);
    box-shadow:0 0 0 3px rgba(47,129,82,.12);
  }
  
  .busca-cx .lupa{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    font-size:16px;
    color:var(--muted);
    pointer-events:none;
  }
  
  .filtros{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:2px 0 10px;
    margin-bottom:4px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  
  .filtros::-webkit-scrollbar{
    display:none;
  }
  
  .chip{
    white-space:nowrap;
    padding:8px 14px;
    border-radius:20px;
    font-size:12px;
    font-weight:700;
    letter-spacing:.02em;
    background:#fff;
    color:var(--muted);
    box-shadow:0 1px 4px rgba(7,26,16,.04);
    flex-shrink:0;
    transition:all .12s ease;
    cursor:pointer;
    border:none;
    min-height:32px;
  }
  
  .chip.on{
    background:var(--g2);
    color:#fff;
    box-shadow:0 2px 8px rgba(26,74,46,.3);
  }
  
  .filtros-label{
    font-size:10px;
    font-weight:700;
    color:var(--muted);
    letter-spacing:.05em;
    text-transform:uppercase;
    margin-bottom:8px;
  }
  
  /* Banners otimizados */
  .banners{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:16px;
  }
  
  .banner{
    border-radius:12px;
    padding:16px 18px;
    color:#fff;
    position:relative;
    overflow:hidden;
    min-height:110px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    background:linear-gradient(130deg,#e08c0a,#c26900);
    box-shadow:0 4px 12px rgba(192,105,0,.25);
  }
  
  .banner.verde{
    background:linear-gradient(130deg,var(--g5),var(--g2));
    box-shadow:0 4px 12px rgba(26,74,46,.25);
  }
  
  .banner::after{
    content:"";
    position:absolute;
    right:-20px;
    top:-20px;
    width:110px;
    height:110px;
    border-radius:50%;
    background:rgba(255,255,255,.12);
  }
  
  .banner::before{
    content:"";
    position:absolute;
    right:12px;
    bottom:-20px;
    width:80px;
    height:80px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
  }
  
  .banner .et{
    font-size:9px;
    font-weight:800;
    letter-spacing:.12em;
    text-transform:uppercase;
    opacity:.8;
    position:relative;
    z-index:1;
  }
  
  .banner h3{
    font-size:18px;
    margin:5px 0 3px;
    position:relative;
    z-index:1;
    text-shadow:0 1px 6px rgba(0,0,0,.2);
  }
  
  .banner p{
    font-size:12px;
    position:relative;
    z-index:1;
    opacity:.92;
    max-width:85%;
  }
  
  .banner .merc{
    font-size:10px;
    margin-top:6px;
    font-weight:700;
    position:relative;
    z-index:1;
    opacity:.9;
  }
  
  /* Lista/Carrinho otimizado */
  .lista-inner{
    padding:12px 12px;
  }
  
  .titulo-secao{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
    gap:10px;
  }
  
  .titulo-secao h2{
    font-size:20px;
    color:var(--g1);
  }
  
  .titulo-secao .sub{
    font-size:12px;
    color:var(--muted);
    margin-top:2px;
  }
  
  .item-cart{
    background:#fff;
    border-radius:10px;
    box-shadow:0 1px 4px rgba(7,26,16,.04);
    padding:12px 12px;
    display:flex;
    align-items:center;
    gap:12px;
    transition:all .15s ease;
    min-height:68px;
  }
  
  .item-cart:active{
    background:var(--g9);
  }
  
  .item-cart.marcado{
    opacity:.6;
  }
  
  .item-cart.marcado .ic-nome{
    text-decoration:line-through;
    color:var(--muted);
  }
  
  .check{
    width:28px;
    height:28px;
    border-radius:6px;
    border:2px solid var(--g5);
    flex-shrink:0;
    display:grid;
    place-items:center;
    cursor:pointer;
    background:#fff;
    transition:all .12s ease;
    font-size:14px;
    color:transparent;
    min-height:28px;
  }
  
  .check.on{
    background:var(--g3);
    border-color:var(--g3);
    color:#fff;
  }
  
  .item-cart .emoji{
    font-size:28px;
    flex-shrink:0;
  }
  
  .item-cart .corpo{
    flex:1;
    min-width:0;
  }
  
  .item-cart .ic-nome{
    font-weight:700;
    color:var(--g1);
    font-size:13px;
    line-height:1.3;
  }
  
  .item-cart .ic-meta{
    font-size:11px;
    color:var(--muted);
    margin-top:2px;
  }
  
  .qtd{
    display:flex;
    align-items:center;
    gap:6px;
    flex-shrink:0;
  }
  
  .qtd button{
    width:32px;
    height:32px;
    border-radius:6px;
    background:var(--g9);
    color:var(--g2);
    font-weight:700;
    font-size:16px;
    line-height:1;
    display:grid;
    place-items:center;
    cursor:pointer;
    border:none;
    transition:all .12s ease;

  }

  /* Modal otimizado */
  .modal-fundo{

    inset:0;
    background:rgba(7,26,16,.6);

  }
  
  .modal{

    color:var(--g1);

  }

  /* Toast otimizado */

    gap:8px;
    align-items:center;
    pointer-events:none;
    width:90%;
    max-width:360px;
  }
  
  .toast{
    background:var(--g0);
    color:#d4edda;
    padding:12px 16px;
    border-radius:10px;
    font-size:13px;
    font-weight:600;
    box-shadow:0 8px 24px rgba(0,0,0,.3);

    display:flex;
    align-items:center;
    gap:8px;
    width:100%;

    inset:0;

    background-position:center;
    z-index:0;

  }
  
  .hero-oferta p{
    font-size:12px;
    opacity:.9;
    line-height:1.4;
  }
  
  .portal-caixa{
    width:100%;
  }
  
  .portal-cabeca{

  }

  .abas{

    background:none;

  }
  
  .abas button.on{
    background:rgba(255,255,255,.15);
    color:#fff;
  }
  
  .cartao-portal{
    background:rgba(255,255,255,.07);

    padding:18px;
    backdrop-filter:blur(10px);

  .cartao-portal .campo label{

  .cartao-portal .campo input::placeholder{

  }
  
  .cartao-portal .campo input:focus{
    border-color:var(--g5);
    background:rgba(255,255,255,.12);
    box-shadow:0 0 0 3px rgba(82,168,112,.2);

  .cartao-portal .btn{
    background:var(--g4);
    box-shadow:0 4px 16px rgba(47,129,82,.4);
  }
  
  .dica-login{
    font-size:11px;
    color:rgba(212,237,218,.45);
    text-align:center;
    margin-top:12px;
  }
  
  /* Carrossel otimizado */
  .car-faixa{
    background:rgba(255,255,255,.04);
    padding:12px 0 16px;
    border-top:1px solid rgba(255,255,255,.07);
  }
  
  .car-cab{
    padding:0 16px 8px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  
  .car-cab .t{
    font-size:10px;
    font-weight:800;
    color:rgba(212,237,218,.55);
    letter-spacing:.07em;
    text-transform:uppercase;
  }
  
  .car-cab .nav{
    display:flex;
    gap:6px;
  }
  
  .car-cab .nav button{
    width:28px;
    height:28px;
    border-radius:50%;

    place-items:center;
    cursor:pointer;
    border:none;

  .car-cab .nav button:active{

  }

    padding:4px 16px 6px;

  .car-trilho{
    display:flex;
    gap:12px;

  .car-card{
    flex:0 0 76vw;
    max-width:280px;
    border-radius:10px;
    overflow:hidden;
    background:rgba(255,255,255,.09);

    min-height:100px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    color:#fff;
    padding:12px;
  }
  
  .car-card.patro{
    border-color:rgba(112,72,232,.35);
  }
  
  .car-card .bg{
    position:absolute;
    inset:0;
    background-size:cover;
    background-position:center;
    z-index:0;
  }
  
  .car-card.tem-foto .bg::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(transparent 30%,rgba(0,0,0,.75));

  .car-card>*{
    position:relative;
    z-index:1;
  }
  
  .car-card .tagp{
    align-self:flex-start;
    font-size:8px;
    font-weight:800;
    letter-spacing:.07em;
    text-transform:uppercase;

    margin-bottom:auto;

  .car-card .tagp.of{
    background:var(--amber);

  }
  
  .car-card .tagp.pa{
    background:#7048e8;
    color:#fff;
  }
  
  .car-card h4{
    font-size:13px;
    margin:6px 0 2px;

  .car-card p{
    font-size:11px;
    opacity:.85;

    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  
  .car-card .v{
    font-size:10px;
    opacity:.7;
    margin-top:3px;
  }
  
  /* Recomendação otimizada */
  .reco{
    border-radius:12px;
    padding:16px 18px;
    color:#fff;
    background:linear-gradient(140deg,var(--g4),var(--g1));
    box-shadow:0 8px 24px rgba(7,26,16,.25);
    margin-bottom:16px;
  }
  
  .reco .et{
    font-size:9px;
    font-weight:800;
    letter-spacing:.1em;
    text-transform:uppercase;
    opacity:.8;
  }
  
  .reco h3{
    font-size:20px;
    margin:5px 0 3px;
  }
  
  .reco .cob{
    font-size:12px;
    opacity:.88;
  }
  
  .reco .linhas{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
    margin-top:10px;
  }
  
  .reco .bloco .n{
    font-size:18px;
    font-weight:800;
    font-family:var(--font-serif);
  }
  
  .reco .bloco .r{
    font-size:10px;
    opacity:.8;
  }
  
  .reco .eco{
    margin-top:10px;
    background:rgba(255,255,255,.14);
    border-radius:8px;
    padding:8px 12px;
    font-size:12px;
  }
  
  .reco .btn-mapa{
    margin-top:10px;
    background:#fff;
    color:var(--g2);
    font-weight:700;
    border-radius:8px;
    padding:10px 14px;
    font-size:12px;
    display:inline-flex;
    align-items:center;
    gap:6px;
    cursor:pointer;
    border:none;
  }
  
  .comp{
    background:#fff;
    border-radius:10px;
    box-shadow:0 1px 4px rgba(7,26,16,.04);
    overflow:hidden;
    margin-bottom:14px;
  }
  
  .comp-tit{
    padding:12px 14px 4px;
    font-weight:700;
    color:var(--g2);
    font-size:13px;
    letter-spacing:.01em;
  }
  
  .comp-linha{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 14px;
    border-bottom:1px solid var(--g8);
  }
  
  .comp-linha:last-child{
    border-bottom:none;
  }
  
  .comp-linha.melhor{
    background:#edf8f1;
  }
  
  .comp-linha .pos{
    width:24px;
    height:24px;
    border-radius:50%;
    background:var(--g9);
    display:grid;
    place-items:center;
    font-size:11px;
    font-weight:800;
    color:var(--g2);
    flex-shrink:0;

  .comp-linha.melhor .pos{
    background:var(--g3);
    color:#fff;
  }
  
  .comp-linha .corpo{
    flex:1;
    min-width:0;
  }
  
  .comp-linha .corpo b{
    color:var(--g1);
    font-size:13px;
  }
  
  .comp-linha .corpo .d{
    font-size:10px;
    color:var(--muted);
  }
  
  .comp-linha .tot .v{
    font-size:14px;
    font-weight:800;
    color:var(--g2);
  }
  
  .comp-linha .tot .s{
    font-size:10px;
    color:var(--muted);
  }

  .rodape-patro{

  .rodape-patro .et-rod{
    font-size:9px;
    font-weight:800;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:#7048e8;

  /* Tags */
  .tag{

    font-size:10px;

    padding:2px 8px;
    border-radius:20px;
  }
  
  .tag.promo{
    background:var(--red-lt);
    color:var(--red);
  }

  /* ── Comunidade (ofertas enviadas por clientes) ──────────────────── */
  .campo textarea{
    width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:var(--r-sm);
    background:var(--g9);color:var(--ink);font-size:15px;min-height:90px;resize:vertical;
    transition:.15s;font-family:inherit;
  }
  .campo textarea:focus{outline:none;border-color:var(--g4);background:#fff;box-shadow:0 0 0 3px rgba(47,129,82,.12)}
  .com-wrap{padding:18px 16px 0}
  .com-cab{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .com-cab h2{font-size:20px;color:var(--g1)}
  .com-cab .sub{font-size:12.5px;color:var(--muted);margin-top:2px;max-width:280px}
  .minhas-ofertas{margin-bottom:20px}
  .minhas-ofertas .tit{font-size:11.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--g3);margin-bottom:8px}
  .mo-item{background:#fff;border-radius:var(--r-md);box-shadow:var(--sh-sm);padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .mo-item b{font-size:13.5px;color:var(--ink);font-weight:700;display:block}
  .mo-item .mot{font-size:11.5px;color:var(--muted);margin-top:3px}
  .tag-status{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
  .tag-status.pendente{background:#fff4e0;color:var(--amber-dk)}
  .tag-status.aprovada{background:var(--g8);color:var(--g3)}
  .tag-status.rejeitada{background:var(--red-lt);color:var(--red)}
  .com-card{margin-bottom:14px}
  .com-card h3{font-size:17px;margin-bottom:4px;color:var(--ink)}
  .com-card .autor{font-size:11.5px;color:var(--muted);margin:0 0 9px}
  .com-card img.foto-oferta{width:100%;border-radius:var(--r-md);margin-bottom:10px;max-height:180px;object-fit:cover;display:block}
  .com-card .desc{font-size:14px;color:var(--ink);line-height:1.5;margin-bottom:12px}
  .com-card .rod-com{display:flex;align-items:center;justify-content:space-between;gap:10px;border-top:1px solid var(--line);padding-top:10px}
  /* Carrossel de imagens das ofertas da comunidade */
  .oc-carousel{position:relative;border-radius:var(--r-md);overflow:hidden;margin-bottom:10px;background:#f0f4f0}
  .oc-carousel-track{display:flex;transition:transform .35s cubic-bezier(.4,0,.2,1)}
  .oc-carousel-track img{flex:0 0 100%;width:100%;max-height:200px;object-fit:cover;display:block}
  .oc-carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.45);color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:17px;cursor:pointer;display:grid;place-items:center;z-index:2;transition:background .2s}
  .oc-carousel-btn:hover{background:rgba(0,0,0,.7)}
  .oc-carousel-btn.prev{left:8px}
  .oc-carousel-btn.next{right:8px}
  .oc-carousel-dots{display:flex;justify-content:center;gap:5px;padding:6px 0 2px}
  .oc-carousel-dots span{width:6px;height:6px;border-radius:50%;background:var(--line);transition:background .2s;cursor:pointer}
  .oc-carousel-dots span.on{background:var(--g4)}
  /* Upload múltiplo no formulário */
  .multi-foto-area{border:2px dashed var(--line);border-radius:12px;padding:14px;background:#fafcfa}
  .multi-foto-previews{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;min-height:0}
  .multi-foto-item{position:relative;width:80px;height:80px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
  .multi-foto-item img{width:100%;height:100%;object-fit:cover}
  .multi-foto-item .rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:grid;place-items:center;line-height:1}
  .multi-foto-add{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);font-size:12px;cursor:pointer}
  .multi-foto-add .ic{font-size:28px}
  .lista-comentarios{max-height:280px;overflow-y:auto}
  .coment-item{padding:9px 0;border-bottom:1px solid var(--line)}
  .coment-item:last-child{border-bottom:none}
  .coment-item b{font-size:13px;color:var(--g2)}
  .coment-item .coment-data{font-size:10.5px;color:var(--muted);margin-left:6px}
  .coment-item p{font-size:13.5px;color:var(--ink);margin-top:3px;line-height:1.4}
  .sem-coment{color:var(--muted);font-size:13.5px;text-align:center;padding:18px 0}

  /* ════════════════════════════════════════════════════════════════════
     TEMA "MERCADO LIVRE"  ·  re-skin completo (sobrescreve o tema verde)
     Amarelo no topo · azul nos botões/links · cinza claro no fundo ·
     cards brancos · preços escuros · frete/desconto em verde · tudo sem serifa
     ════════════════════════════════════════════════════════════════════ */
  :root{
    /* paleta Mercado Livre */
    --ml-amarelo:#ffe600; --ml-amarelo-dk:#ffdb15;
    --ml-azul:#3483fa;    --ml-azul-dk:#2968c8;  --ml-azul-lt:#e3edfd;
    --ml-verde:#00a650;   --ml-verde-dk:#00803e;
    --ml-texto:#333;      --ml-texto2:#666;      --ml-texto3:#999;
    --ml-linha:#e6e6e6;   --ml-cinza:#ebebeb;    --ml-cinza2:#f5f5f5;

    /* remapeia os tokens originais (escala "verde" -> azul ML) */
    --g0:#2d3277; --g1:#1f2d52; --g2:#2968c8; --g3:#3483fa; --g4:#3483fa;
    --g5:#5b9bff; --g6:#8fbcff; --g7:#c5dcff; --g8:#e8f0fe; --g9:#f7fafe;
    --amber:#ffe600; --amber-dk:#ffdb15;
    --red:#f23d4f; --red-lt:#fdecee;
    --ink:#333; --muted:#999; --line:#e6e6e6; --bg:#ebebeb;
    /* ML não usa serifa: títulos e preços passam a sans */
    --font-serif:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  }
  h1,h2,h3{letter-spacing:-.01em;font-weight:600}

  /* ── Cabeçalho amarelo ──────────────────────────────────────────── */
  .topo{
    background:var(--ml-amarelo)!important;color:var(--ml-texto)!important;
    border-bottom:1px solid rgba(0,0,0,.07)!important;
    box-shadow:0 1px 2px rgba(0,0,0,.06);
  }
  .marca{color:var(--ml-texto)!important;font-weight:700}
  .marca .cesta{background:linear-gradient(140deg,var(--ml-azul),var(--ml-azul-dk))!important;color:#fff}
  .ao-vivo{color:var(--ml-verde-dk)!important;font-weight:600}
  .ao-vivo .pt{background:var(--ml-verde)!important}
  .quem{color:rgba(0,0,0,.55)!important}
  .quem b{color:var(--ml-texto)!important}
  .btn-sair,.loc-btn{
    background:rgba(0,0,0,.07)!important;color:var(--ml-texto)!important;
  }
  .btn-sair:active,.loc-btn:active{background:rgba(0,0,0,.14)!important}

  /* ── Barra de seções (abas) ─────────────────────────────────────── */
  .barra-secoes{background:#fff;border-bottom:1px solid var(--ml-linha)}
  .barra-secoes button{color:var(--ml-texto2)}
  .barra-secoes button.on{color:var(--ml-azul)!important;border-bottom-color:var(--ml-azul)!important}

  /* ── Botões ─────────────────────────────────────────────────────── */
  .btn{
    background:var(--ml-azul)!important;color:#fff!important;
    border-radius:6px!important;box-shadow:none!important;font-weight:600;
  }
  .btn:active{background:var(--ml-azul-dk)!important;opacity:1}
  .btn.fantasma{
    background:var(--ml-azul-lt)!important;color:var(--ml-azul)!important;box-shadow:none!important;
  }
  .btn.fantasma:active{background:#d4e3fc!important}

  /* ── Busca (estilo ML) ──────────────────────────────────────────── */
  .busca-cx input{
    border:1px solid var(--ml-linha)!important;border-radius:4px!important;
    background:#fff!important;box-shadow:0 1px 2px rgba(0,0,0,.10)!important;
  }
  .busca-cx input:focus{border-color:var(--ml-azul)!important;box-shadow:0 0 0 2px rgba(52,131,250,.2)!important}

  /* ── Chips de filtro ────────────────────────────────────────────── */
  .filtros-label{color:var(--ml-texto2)}
  .chip{background:#fff;color:var(--ml-texto2);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .chip.on{background:var(--ml-azul)!important;color:#fff!important;box-shadow:none!important}

  /* ── Card de produto ────────────────────────────────────────────── */
  .prod{border:1px solid #ededed;box-shadow:0 1px 2px rgba(0,0,0,.06);border-radius:6px}
  .prod .foto{background:#fff}
  .prod .pnome{color:var(--ml-texto);font-weight:400}
  .prod .pcat{color:var(--ml-texto3)}
  .prod .pde{color:var(--ml-texto3)}
  .prod .ppor{color:var(--ml-texto)!important;font-weight:600}
  .prod .ppor.promo{color:var(--ml-texto)!important}
  /* selo de desconto verde, como no ML */
  .prod .selo{background:var(--ml-verde)!important;box-shadow:none!important;border-radius:3px}
  /* "frete grátis" verde abaixo do preço */
  .prod .precos::after{
    content:"Frete grátis";display:block;width:100%;
    color:var(--ml-verde);font-weight:600;font-size:11px;margin-top:2px;
  }
  /* botão adicionar -> link/botão azul ML */
  .prod .add{
    background:#fff!important;color:var(--ml-azul)!important;
    border:1px solid var(--ml-azul)!important;border-radius:5px!important;
  }
  .prod .add:active{background:var(--ml-azul)!important;color:#fff!important}
  .prod .add.no-carrinho{background:var(--ml-azul)!important;color:#fff!important;border-color:var(--ml-azul)!important}

  /* ── Lista / carrinho ───────────────────────────────────────────── */
  .titulo-secao h2{color:var(--ml-texto)}
  .item-cart{border:1px solid #ededed;box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .item-cart .ic-nome{color:var(--ml-texto);font-weight:600}
  .check.on{background:var(--ml-azul)!important;border-color:var(--ml-azul)!important}
  .check{border-color:var(--ml-azul)}
  .qtd button{background:var(--ml-azul-lt);color:var(--ml-azul)}
  .qtd button:active{background:#d4e3fc}
  .item-cart .preco-l{color:var(--ml-verde-dk)}
  .merc-label{color:var(--ml-azul)}

  /* resumo do total -> faixa branca com total verde (ML) */
  .resumo{background:#fff!important;color:var(--ml-texto)!important;border:1px solid var(--ml-linha)}
  .resumo .l{color:var(--ml-texto2)!important;opacity:1}
  .resumo .total{color:var(--ml-texto)!important;border-top-color:var(--ml-linha)!important}
  .resumo .total span:last-child{color:var(--ml-verde)}

  /* ── Banners promocionais ───────────────────────────────────────── */
  .banner{background:linear-gradient(130deg,var(--ml-azul),var(--ml-azul-dk))!important;box-shadow:0 2px 8px rgba(52,131,250,.25)!important}
  .banner.verde{background:linear-gradient(130deg,var(--ml-verde),var(--ml-verde-dk))!important;box-shadow:0 2px 8px rgba(0,166,80,.25)!important}

  /* ── Recomendação / comparador ──────────────────────────────────── */
  .reco{background:linear-gradient(140deg,var(--ml-azul),var(--ml-azul-dk))!important;box-shadow:0 6px 18px rgba(52,131,250,.25)!important}
  .reco .btn-mapa{color:var(--ml-azul)!important}
  .comp-tit{color:var(--ml-azul)}
  .comp-linha.melhor{background:var(--ml-azul-lt)}
  .comp-linha .pos{background:#eef2f7;color:var(--ml-azul)}
  .comp-linha.melhor .pos{background:var(--ml-azul)!important;color:#fff}
  .comp-linha .tot .v{color:var(--ml-verde-dk)}

  /* ── Histórico ──────────────────────────────────────────────────── */
  .hist-cabeca .vtotal{color:var(--ml-verde-dk)}

  /* ── Estados / tags ─────────────────────────────────────────────── */
  .vazio b{color:var(--ml-texto)}
  .tag.promo{background:#e6f6ec;color:var(--ml-verde-dk)}
  .modal-cabeca h3{color:var(--ml-texto)}

  /* ── Portal / login (tema claro ML) ─────────────────────────────── */
  #tela-portal.portal{background:var(--ml-cinza)!important}
  .portal-cabeca .sel{background:linear-gradient(140deg,var(--ml-azul),var(--ml-azul-dk))!important}
  .portal-cabeca h1{color:var(--ml-texto)!important}
  .portal-cabeca p{color:var(--ml-texto2)!important}
  .abas{background:#fff;border:1px solid var(--ml-linha)}
  .abas button{color:var(--ml-texto2)}
  .abas button.on{background:var(--ml-azul)!important;color:#fff!important}
  .cartao-portal{background:#fff!important;border:1px solid var(--ml-linha)!important;backdrop-filter:none!important;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .cartao-portal .campo label{color:var(--ml-texto2)!important}
  .cartao-portal .campo input{background:#fff!important;border-color:var(--ml-linha)!important;color:var(--ml-texto)!important}
  .cartao-portal .campo input::placeholder{color:var(--ml-texto3)!important}
  .cartao-portal .campo input:focus{border-color:var(--ml-azul)!important;background:#fff!important;box-shadow:0 0 0 2px rgba(52,131,250,.2)!important}
  .cartao-portal .btn{background:var(--ml-azul)!important;box-shadow:none!important}
  .dica-login{color:var(--ml-texto3)!important}
  /* carrossel de ofertas do portal em tema claro */
  .car-faixa{background:#fff!important;border-top:1px solid var(--ml-linha)!important}
  .car-cab .t{color:var(--ml-texto2)!important}
  .car-cab .nav button{background:var(--ml-azul-lt)!important;color:var(--ml-azul)!important}
  .car-card{background:var(--ml-cinza2)!important;border:1px solid var(--ml-linha)!important;color:var(--ml-texto)!important}
  .car-card.tem-foto{color:#fff!important}
  .car-card h4{color:inherit}
  .car-card .tagp.of{background:var(--ml-verde)!important;color:#fff!important}

  /* ── Toast ──────────────────────────────────────────────────────── */
  .toast{background:var(--ml-texto)!important;color:#fff!important}
  .toast.erro{background:var(--red)!important}

  /* ── Comunidade — vitrine profissional de ofertas (estilo ML) ───── */
  .com-secao{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:8px 0 12px}
  .com-secao-tit{font-size:13px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--ml-texto)}
  .com-secao-tit span{color:var(--ml-texto3);font-weight:600}
  .com-grade{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:14px;align-items:stretch}

  .oc-card{
    position:relative;background:#fff;border:1px solid #ececec;border-radius:10px;
    box-shadow:0 1px 2px rgba(0,0,0,.05);overflow:hidden;cursor:pointer;
    display:flex;flex-direction:column;transition:box-shadow .18s,transform .18s,border-color .18s;
  }
  .oc-card:hover{box-shadow:0 8px 22px rgba(0,0,0,.12);transform:translateY(-2px);border-color:#e2e2e2}
  .oc-card:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(52,131,250,.4)}
  .oc-foto{position:relative;aspect-ratio:1/1;background:#f6f6f6;overflow:hidden;display:grid;place-items:center}
  .oc-foto img{width:100%;height:100%;object-fit:cover;transition:transform .35s ease}
  .oc-card:hover .oc-foto img{transform:scale(1.05)}
  .oc-sem-foto{font-size:44px;opacity:.3}
  .oc-badge-off{position:absolute;top:9px;left:9px;background:#00a650;color:#fff;font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.18)}
  .oc-badge-novo{position:absolute;top:9px;right:9px;background:var(--ml-azul);color:#fff;font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em}
  .oc-photos{position:absolute;bottom:9px;right:9px;background:rgba(0,0,0,.6);color:#fff;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:12px;display:inline-flex;align-items:center;gap:4px}
  .oc-corpo{padding:11px 12px 12px;display:flex;flex-direction:column;flex:1}
  .oc-tit{font-size:13.5px;font-weight:500;color:#333;line-height:1.32;min-height:36px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .oc-precos{margin-top:9px}
  .oc-de{font-size:11.5px;color:#999;text-decoration:line-through;display:block;line-height:1.2}
  .oc-por{font-size:22px;font-weight:600;color:#1a1a1a;letter-spacing:-.02em;line-height:1.05;margin-top:1px}
  .oc-eco{font-size:11.5px;color:#00a650;font-weight:600;margin-top:3px}
  .oc-sem-preco{font-size:12px;color:#bbb;margin-top:9px;font-style:italic}
  .oc-validade{display:inline-flex;align-items:center;gap:4px;margin-top:9px;font-size:11px;color:var(--ml-texto2);background:#f3f3f3;border-radius:12px;padding:3px 9px;align-self:flex-start;max-width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .oc-foot{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:11px;margin-top:12px;border-top:1px solid #f1f1f1}
  .oc-avatar{width:22px;height:22px;border-radius:50%;background:var(--ml-azul-lt);color:var(--ml-azul);font-size:10px;font-weight:700;display:grid;place-items:center;flex-shrink:0;text-transform:uppercase}
  .oc-autor{font-size:11px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .oc-coment{font-size:11px;color:var(--ml-texto2);display:inline-flex;align-items:center;gap:3px;white-space:nowrap;flex-shrink:0}

  /* ── Detalhe da oferta (modal rico) ─────────────────────────────── */
  .od-gal{position:relative;border-radius:10px;overflow:hidden;background:#f6f6f6;margin-bottom:16px}
  .od-track{display:flex;transition:transform .35s cubic-bezier(.4,0,.2,1)}
  .od-track img{flex:0 0 100%;width:100%;height:260px;object-fit:cover;display:block}
  .od-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);color:#fff;border:none;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;display:grid;place-items:center;z-index:2;transition:background .2s}
  .od-nav:hover{background:rgba(0,0,0,.72)}
  .od-nav.prev{left:8px}.od-nav.next{right:8px}
  .od-dots{position:absolute;bottom:9px;left:0;right:0;display:flex;justify-content:center;gap:5px;z-index:2}
  .od-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.55);cursor:pointer}
  .od-dots span.on{background:#fff}
  .od-sem{height:200px;display:grid;place-items:center;font-size:54px;opacity:.3}
  .od-badge-off{position:absolute;top:10px;left:10px;background:#00a650;color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:5px;z-index:2;box-shadow:0 1px 4px rgba(0,0,0,.2)}
  .od-precos{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .od-de{font-size:14px;color:#999;text-decoration:line-through}
  .od-por{font-size:30px;font-weight:600;color:#1a1a1a;letter-spacing:-.02em;line-height:1}
  .od-eco{font-size:13px;color:#00a650;font-weight:600;margin-top:5px}
  .od-badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px}
  .od-chip{font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:14px;display:inline-flex;align-items:center;gap:4px}
  .od-chip.com{background:var(--ml-azul-lt);color:var(--ml-azul)}
  .od-chip.val{background:#e8f6ee;color:var(--ml-verde-dk)}
  .od-desc{font-size:14px;color:#444;line-height:1.55;margin-top:15px;white-space:pre-wrap;word-break:break-word}
  .od-author{display:flex;align-items:center;gap:10px;margin-top:15px;padding-top:15px;border-top:1px solid var(--ml-linha)}
  .od-author .av{width:34px;height:34px;border-radius:50%;background:var(--ml-azul-lt);color:var(--ml-azul);font-weight:700;font-size:13px;display:grid;place-items:center;text-transform:uppercase;flex-shrink:0}
  .od-author .nm{font-size:13.5px;color:#333;font-weight:600}
  .od-author .dt{font-size:11.5px;color:#999;margin-top:1px}
  .od-sec{font-size:13px;font-weight:700;color:var(--ml-texto);margin:18px 0 10px}

  /* modal rolável para conteúdo longo (detalhe/formulário) */
  .modal{max-height:92vh;display:flex;flex-direction:column}
  .modal-cabeca,.modal-pe{flex-shrink:0}
  .modal-corpo{overflow-y:auto;-webkit-overflow-scrolling:touch}

  /* ── Ações nas minhas ofertas (editar / excluir) ────────────────── */
  .mo-item{flex-direction:column;align-items:stretch;gap:9px}
  .mo-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .mo-acoes{display:flex;gap:8px}
  .mo-edit,.mo-del{flex:1;padding:8px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid;background:#fff;transition:.12s}
  .mo-edit{color:var(--ml-azul);border-color:var(--ml-azul)}
  .mo-edit:active{background:var(--ml-azul);color:#fff}
  .mo-del{color:var(--red);border-color:var(--red)}
  .mo-del:active{background:var(--red);color:#fff}

  /* ── Responsivo: usa o espaço no computador, 2 colunas no celular ── */
  /* grade de produtos (Comprar) também responsiva */
  .grade.col3{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))!important}
  @media (min-width:640px){
    /* centraliza o app em telas grandes, sem esticar de borda a borda */
    body{max-width:1080px!important}
    .barra-secoes{top:56px}
  }

</style>
</head>
<body>

<div id="carregando" class="carregando"><div class="spinner"></div></div>

<!-- PORTAL: somente cliente -->
<div id="tela-portal" class="portal escondido">
  <div class="portal-wrap">
    <!-- CABEÇALHO: última oferta -->
    <div id="portal-hero" class="hero-oferta"></div>
    <div class="portal-caixa">
    <div class="portal-cabeca">
      <div class="sel">🛒</div>
      <h1>Cesta</h1>
      <p>Monte sua lista, compare ofertas e economize</p>
    </div>
    <div class="cartao-portal">
      <div class="abas">
        <button id="aba-entrar" class="on" onclick="trocarAba('entrar')">Entrar</button>
        <button id="aba-criar" onclick="trocarAba('criar')">Criar conta</button>
      </div>
      <div id="form-entrar">
        <div class="campo"><label>E-mail</label><input id="entrar-email" type="email" placeholder="seu@email.com" autocomplete="email"></div>
        <div class="campo"><label>Senha</label><input id="entrar-senha" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')fazerLogin()" autocomplete="current-password"></div>
        <button class="btn full" onclick="fazerLogin()">Entrar</button>
        <p class="dica-login"><code></code> · <code></code></p>
      </div>
      <div id="form-criar" class="escondido">
        <div class="campo"><label>Nome completo</label><input id="criar-nome" type="text" placeholder="Como devemos te chamar?" autocomplete="name"></div>
        <div class="campo"><label>E-mail</label><input id="criar-email" type="email" placeholder="seu@email.com" autocomplete="email"></div>
        <div class="campo"><label>Telefone</label><input id="criar-tel" type="tel" placeholder="(00) 00000-0000" autocomplete="tel"></div>
        <div class="campo"><label>Senha</label><input id="criar-senha" type="password" placeholder="Crie uma senha" autocomplete="new-password"></div>
        <button class="btn full" onclick="criarConta()">Criar minha conta</button>
      </div>
    </div>
    </div>
  </div>
  <!-- RODAPÉ: demais ofertas + patrocinadas em carrossel -->
  <div id="portal-rodape" class="car-faixa escondido">
    <div class="car-cab"><div class="t" id="portal-car-tit">Mais ofertas</div>
      <div class="nav"><button onclick="carMover('portal',-1)">‹</button><button onclick="carMover('portal',1)">›</button></div></div>
    <div class="car-janela"><div class="car-trilho" id="portal-car"></div></div>
  </div>
</div>

<div id="topo" class="topo escondido">
  <div class="marca"><span class="cesta">🛒</span><span>Cesta</span></div>
  <div class="dir">
    <button class="loc-btn" id="loc-btn" onclick="abrirLocal()">📍 <span id="loc-label">definir local</span></button>
    <span class="ao-vivo" id="ao-vivo"><span class="pt"></span> ofertas ao vivo</span>
    <div class="quem"><span>olá,</span><b id="topo-nome"></b></div>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
</div>

<main id="conteudo" class="escondido"></main>

<div id="modal-fundo" class="modal-fundo" onclick="if(event.target===this)fecharModal()">
  <div class="modal">
    <div class="modal-cabeca"><h3 id="modal-titulo">Título</h3><button class="x" onclick="fecharModal()">×</button></div>
    <div class="modal-corpo" id="modal-corpo"></div>
    <div class="modal-pe" id="modal-pe"></div>
  </div>
</div>
<div class="toast-area" id="toast-area"></div>

<script type="module">
/* ============================================================
   CESTA · SITE DO CLIENTE — Firebase Firestore (somente cliente)
   ============================================================ */

/* ====== WhatsApp / YouTube ====== */
function soDigitos(s){return String(s||"").replace(/\D/g,"");}
function zapNumero(tel){ let d=soDigitos(tel); if(!d) return null; if(d.startsWith("0")) d=d.replace(/^0+/,""); if(d.length<=11 && !d.startsWith("55")) d="55"+d; return d; }
function zapLink(tel,texto){ const d=zapNumero(tel); if(!d) return null; return `https://wa.me/${d}?text=${encodeURIComponent(texto||"")}`; }
function ytId(url){ const m=String(url||"").match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/); return m?m[1]:null; }
function ytEmbed(url){ const id=ytId(url); return id?`<div class="yt-player"><iframe src="https://www.youtube.com/embed/${id}?rel=0" frameborder="0" allowfullscreen loading="lazy"></iframe></div>`:""; }

  setTimeout(()=>{t.style.opacity="0";t.style.transition=".3s";setTimeout(()=>t.remove(),300);},2600);
}

/* ====== utilidades de comparação/distância ====== */
function norm(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g," ").trim();}
const precoEf=p=>(p.emPromocao&&p.precoPromocional>0)?p.precoPromocional:p.preco;
function distKm(a,b){
  if(!a||!b||a.lat==null||b.lat==null) return null;
  const R=6371,r=Math.PI/180,dLat=(b.lat-a.lat)*r,dLng=(b.lng-a.lng)*r;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
const distLabel=k=>k==null?"—":(k<1?`${Math.round(k*1000)} m`:`${k.toFixed(1)} km`);
function mesmaCoisa(a,b){
  const x=norm(a),y=norm(b);
  if(!x||!y) return false;
  if(x===y) return true;
  if(x.length>=4&&y.includes(x))return true;
  if(y.length>=4&&x.includes(y))return true;
  const px=x.split(" ").filter(w=>w.length>2),py=y.split(" ").filter(w=>w.length>2);
  const comuns=px.filter(w=>py.includes(w));
  return comuns.length>=2 && comuns.length>=Math.min(px.length,py.length)-1;
}

async function fazerLogin(){
  const email=$("#entrar-email").value.trim().toLowerCase(), senha=$("#entrar-senha").value;
  if(!email||!senha) return toast("Preencha e-mail e senha.",true);
  try{
    const achados=await fsWhere("clientes","email",email);
    const conta=achados[0];
    if(!conta||conta.senha!==senha) return toast("E-mail ou senha incorretos.",true);
    sessao={id:conta.id,nome:conta.nome,email:conta.email||email,telefone:conta.telefone||""};
    entrarApp();
  }catch(e){ console.error(e); toast("Erro ao conectar à nuvem.",true); }
}

async function criarConta(){
  const nome=$("#criar-nome").value.trim(), email=$("#criar-email").value.trim().toLowerCase();
  const tel=$("#criar-tel").value.trim(), senha=$("#criar-senha").value;
  if(!nome||!email||!senha) return toast("Preencha nome, e-mail e senha.",true);
  try{
    const existe=await fsWhere("clientes","email",email);
    if(existe.length) return toast("Esse e-mail já tem cadastro.",true);
    const id=await fsAdd("clientes",{nome,email,senha,telefone:tel});
    sessao={id,nome,email,telefone:tel};
    toast("Conta criada! Bem-vindo(a).");
    entrarApp();
  }catch(e){ console.error(e); toast("Erro ao criar conta.",true); }
}

/* ====== sincronismo em nuvem (tempo real) ======
   ouve mudanças de produtos, ofertas e supermercados feitas no Gerencial
   e atualiza a tela do cliente automaticamente */
function ligarSincronismo(){
  unsubMercados=onSnapshot(collection(db,"supermercados"),snap=>{
    cacheMercados={}; snap.docs.forEach(d=>cacheMercados[d.id]={id:d.id,...d.data()});
    if(sessao && abaCliente==="comprar") renderComprar();
  });
  unsubProdutos=onSnapshot(collection(db,"produtos"),snap=>{
    cacheProdutos=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(sessao && abaCliente==="comprar") renderGradeProdutos();
  });
  unsubOfertas=onSnapshot(collection(db,"ofertas"),snap=>{
    cacheOfertas=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(sessao && abaCliente==="comprar") renderBanners();
  });
  unsubPatro=onSnapshot(collection(db,"patrocinados"),snap=>{
    cachePatrocinados=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(sessao) montarRodapePatro();
  },err=>{ /* coleção pode não ter permissão ainda */ });
  unsubComunidade=onSnapshot(collection(db,"ofertasComunidade"),snap=>{
    cacheComunidade=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(sessao && abaCliente==="comunidade") renderComunidade();
  },err=>{ /* coleção pode não ter permissão ainda */ });
  unsubComentarios=onSnapshot(collection(db,"comentariosComunidade"),snap=>{
    cacheComentarios=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(sessao && abaCliente==="comunidade") renderComunidade();
    if($("#modal-fundo").classList.contains("on") && comentandoOfertaId){
      const el=$("#lista-comentarios"); if(el) el.innerHTML=comentariosHTML(comentandoOfertaId);
    }
  },err=>{ /* coleção pode não ter permissão ainda */ });
  unsubPedidos=onSnapshot(query(collection(db,"pedidos"),where("clienteId","==",sessao.id)),snap=>{
    const novos=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.criadoEm||0)-(a.criadoEm||0));
    novos.forEach(p=>{
      const ant=_pedStatus[p.id];
      if(ant && ant!==p.status){
        const nomeLoja=cacheMercados[p.supermercadoId]?.nome||"a loja";
        if(p.status==="confirmado") toast(`✅ Pedido confirmado por ${nomeLoja}!`);
        else if(p.status==="recusado") toast(`❌ Pedido recusado por ${nomeLoja}.`,true);
      }
      _pedStatus[p.id]=p.status;
    });
    cachePedidos=novos;
    if(sessao && abaCliente==="historico") renderHistorico();
  },err=>{ /* permissão pode faltar */ });
}
