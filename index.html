<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cesta — sua lista de compras</title>
<style>
  /* ── Design Tokens ───────────────────────────────────────────────── */
  :root{
    --g0:#071a10; --g1:#0f2e1c; --g2:#1a4a2e; --g3:#256640;
    --g4:#2f8152; --g5:#52a870; --g6:#86c99a; --g7:#c4e8cf;
    --g8:#e8f5ec; --g9:#f4fbf6;
    --amber:#f5a623; --amber-dk:#d4841a;
    --red:#c0392b; --red-lt:#fdecea;
    --ink:#0a1f12; --muted:#5a7564; --line:#d4e8da;
    --white:#fff; --bg:#f0f7f2;
    --r-sm:10px; --r-md:16px; --r-lg:22px; --r-xl:28px;
    --sh-sm:0 1px 3px rgba(7,26,16,.07),0 4px 12px rgba(7,26,16,.08);
    --sh-md:0 2px 8px rgba(7,26,16,.08),0 12px 28px rgba(7,26,16,.10);
    --sh-lg:0 8px 24px rgba(7,26,16,.12),0 24px 48px rgba(7,26,16,.12);
    --nav-h:64px; --tab-h:62px;
    --font-sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;
    --font-serif:Georgia,"Times New Roman",serif;
  }

  /* ── Reset ───────────────────────────────────────────────────────── */
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
  body{font-family:var(--font-sans);background:var(--bg);color:var(--ink);line-height:1.5;min-height:100vh;max-width:480px;margin:0 auto;overflow-x:hidden}
  h1,h2,h3{font-family:var(--font-serif);letter-spacing:-.02em;line-height:1.15}
  button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
  input,select,textarea{font-family:inherit;font-size:16px}
  a{color:var(--g4);text-decoration:none}

  /* ── Loading ─────────────────────────────────────────────────────── */
  .carregando{position:fixed;inset:0;background:var(--g0);display:grid;place-items:center;z-index:300}
  .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--g6);border-radius:50%;animation:gira 1s linear infinite}
  @keyframes gira{to{transform:rotate(360deg)}}

  /* ── Animations ──────────────────────────────────────────────────── */
  @keyframes sobe{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes pulso{0%{box-shadow:0 0 0 0 rgba(82,168,112,.6)}70%{box-shadow:0 0 0 7px rgba(82,168,112,0)}100%{box-shadow:0 0 0 0 rgba(82,168,112,0)}}
  .escondido{display:none!important}

  /* ── Top Nav ─────────────────────────────────────────────────────── */
  .topo{
    background:var(--g0);
    color:#d4edda;
    height:var(--nav-h);
    padding:0 16px;
    display:flex;align-items:center;gap:10px;
    position:sticky;top:0;z-index:50;
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  .marca{display:flex;align-items:center;gap:9px;font-weight:700;font-size:18px;font-family:var(--font-serif);letter-spacing:-.02em;color:#fff}
  .marca .cesta{
    width:34px;height:34px;border-radius:9px;
    background:linear-gradient(140deg,var(--g5),var(--g3));
    display:grid;place-items:center;font-size:18px;
    box-shadow:0 2px 8px rgba(0,0,0,.3);
    flex-shrink:0;
  }
  .topo .dir{margin-left:auto;display:flex;align-items:center;gap:8px}
  .ao-vivo{font-size:10.5px;color:var(--g6);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .ao-vivo .pt{width:6px;height:6px;border-radius:50%;background:var(--g6);animation:pulso 1.8s infinite;flex-shrink:0}
  .quem{font-size:11px;color:rgba(212,237,218,.7);text-align:right;line-height:1.3}
  .quem b{display:block;font-size:12.5px;color:#d4edda;font-weight:700}
  .btn-sair{background:rgba(255,255,255,.09);color:#d4edda;padding:7px 11px;border-radius:8px;font-size:12px;font-weight:600;letter-spacing:.01em;transition:background .15s}
  .btn-sair:active{background:rgba(255,255,255,.18)}
  .loc-btn{
    display:flex;align-items:center;gap:5px;
    background:rgba(255,255,255,.09);color:#d4edda;
    padding:7px 11px;border-radius:8px;font-size:12px;font-weight:600;
    max-width:36vw;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
    transition:background .15s;flex-shrink:0;
  }
  .loc-btn:active{background:rgba(255,255,255,.18)}

  /* ── Tab Bar ─────────────────────────────────────────────────────── */
  .barra-secoes{
    position:sticky;top:var(--nav-h);z-index:40;
    background:var(--white);
    border-bottom:1px solid var(--line);
    display:flex;padding:0;
    box-shadow:0 2px 8px rgba(7,26,16,.06);
  }
  .barra-secoes button{
    flex:1;padding:0;height:var(--tab-h);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    font-size:10.5px;font-weight:600;color:var(--muted);letter-spacing:.02em;
    border-bottom:2.5px solid transparent;transition:.15s;
    position:relative;
  }
  .barra-secoes button .tab-ic{font-size:20px;line-height:1;transition:.15s}
  .barra-secoes button.on{color:var(--g2);border-bottom-color:var(--g4)}
  .barra-secoes button.on .tab-ic{transform:scale(1.1)}
  .barra-secoes button .badge{
    position:absolute;top:8px;right:calc(50% - 18px);
    min-width:18px;height:18px;padding:0 5px;
    background:var(--red);color:#fff;border-radius:9px;
    font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;
  }

  /* ── Main ────────────────────────────────────────────────────────── */
  main{padding:0 0 calc(var(--tab-h) + 24px)}

  /* ── Generic Button ──────────────────────────────────────────────── */
  .btn{
    background:var(--g3);color:#fff;
    padding:14px 20px;border-radius:var(--r-md);
    font-weight:700;font-size:15px;letter-spacing:.01em;
    transition:.15s;display:inline-flex;align-items:center;gap:8px;justify-content:center;
    box-shadow:0 2px 8px rgba(15,65,40,.25);
  }
  .btn:active{opacity:.85;transform:scale(.98)}
  .btn.full{width:100%}
  .btn.fantasma{background:transparent;color:var(--g3);box-shadow:inset 0 0 0 1.5px var(--g5)}
  .btn.fantasma:active{background:var(--g9)}
  .btn.peq{padding:8px 14px;font-size:13px;border-radius:var(--r-sm)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

  /* ── Card / Field ────────────────────────────────────────────────── */
  .cartao{background:var(--white);border-radius:var(--r-lg);box-shadow:var(--sh-md);padding:22px}
  .campo{margin-bottom:14px}
  .campo label{display:block;font-size:12px;font-weight:700;color:var(--g2);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
  .campo input{
    width:100%;padding:13px 15px;
    border:1.5px solid var(--line);border-radius:var(--r-sm);
    background:var(--g9);color:var(--ink);font-size:15px;
    transition:.15s;
  }
  .campo input:focus{outline:none;border-color:var(--g4);background:#fff;box-shadow:0 0 0 3px rgba(47,129,82,.12)}

  /* ── Portal / Login ──────────────────────────────────────────────── */
  #tela-portal.portal{
    display:flex;flex-direction:column;min-height:100vh;padding:0;
    background:var(--g0);
  }
  .portal-wrap{
    flex:1;width:100%;padding:20px 20px 24px;
    display:flex;flex-direction:column;gap:16px;
  }
  .hero-oferta{
    border-radius:var(--r-xl);overflow:hidden;position:relative;
    min-height:200px;display:flex;flex-direction:column;justify-content:flex-end;
    color:#fff;padding:22px;
    background:linear-gradient(140deg,var(--g3),var(--g1));
    box-shadow:0 16px 40px rgba(7,26,16,.4);
  }
  .hero-oferta .bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
  .hero-oferta .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(7,26,16,.1),rgba(7,26,16,.82))}
  .hero-oferta>*{position:relative;z-index:1}
  .hero-oferta .et{
    display:inline-flex;align-items:center;gap:6px;align-self:flex-start;
    background:var(--amber);color:#3a1800;
    font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
    padding:5px 11px;border-radius:20px;margin-bottom:10px;
  }
  .hero-oferta h2{font-size:24px;margin-bottom:5px;text-shadow:0 1px 8px rgba(0,0,0,.4)}
  .hero-oferta p{font-size:13.5px;opacity:.9;line-height:1.4}
  .hero-oferta .meta{margin-top:10px;font-size:11.5px;opacity:.85;display:flex;gap:14px;flex-wrap:wrap}

  /* login card */
  .portal-caixa{width:100%}
  .portal-cabeca{text-align:center;margin-bottom:20px}
  .portal-cabeca .sel{
    width:60px;height:60px;border-radius:16px;margin:0 auto 12px;
    display:grid;place-items:center;font-size:28px;
    background:linear-gradient(140deg,var(--g5),var(--g3));
    box-shadow:0 8px 20px rgba(7,26,16,.35);
  }
  .portal-cabeca h1{font-size:28px;color:#fff}
  .portal-cabeca p{color:rgba(212,237,218,.65);margin-top:4px;font-size:13.5px}
  .abas{display:flex;background:rgba(255,255,255,.08);border-radius:12px;padding:4px;margin-bottom:18px;gap:4px}
  .abas button{flex:1;padding:10px;border-radius:9px;font-size:13.5px;font-weight:600;color:rgba(212,237,218,.6)}
  .abas button.on{background:rgba(255,255,255,.15);color:#fff}
  .cartao-portal{background:rgba(255,255,255,.07);border-radius:var(--r-lg);border:1px solid rgba(255,255,255,.1);padding:22px;backdrop-filter:blur(10px)}
  .cartao-portal .campo label{color:rgba(212,237,218,.8)}
  .cartao-portal .campo input{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12);color:#fff}
  .cartao-portal .campo input::placeholder{color:rgba(212,237,218,.35)}
  .cartao-portal .campo input:focus{border-color:var(--g5);background:rgba(255,255,255,.12);box-shadow:0 0 0 3px rgba(82,168,112,.2)}
  .cartao-portal .btn{background:var(--g4);box-shadow:0 4px 16px rgba(47,129,82,.4)}
  .dica-login{font-size:11.5px;color:rgba(212,237,218,.45);text-align:center;margin-top:14px}

  /* carousel portal */
  .car-faixa{background:rgba(255,255,255,.04);padding:14px 0 18px;border-top:1px solid rgba(255,255,255,.07)}
  .car-cab{padding:0 20px 9px;display:flex;align-items:center;justify-content:space-between}
  .car-cab .t{font-size:11px;font-weight:800;color:rgba(212,237,218,.55);letter-spacing:.07em;text-transform:uppercase}
  .car-cab .nav{display:flex;gap:6px}
  .car-cab .nav button{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.1);color:var(--g6);font-size:15px;display:grid;place-items:center}
  .car-janela{overflow:hidden;padding:4px 20px 6px}
  .car-trilho{display:flex;gap:12px;transition:transform .5s cubic-bezier(.4,0,.2,1);will-change:transform}
  .car-card{
    flex:0 0 76vw;max-width:290px;
    border-radius:var(--r-md);overflow:hidden;
    background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.1);
    position:relative;min-height:110px;
    display:flex;flex-direction:column;justify-content:flex-end;
    color:#fff;padding:14px;
  }
  .car-card.patro{border-color:rgba(112,72,232,.35)}
  .car-card .bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
  .car-card.tem-foto .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(transparent 30%,rgba(0,0,0,.75))}
  .car-card>*{position:relative;z-index:1}
  .car-card .tagp{align-self:flex-start;font-size:9.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;padding:3px 9px;border-radius:20px;margin-bottom:auto}
  .car-card .tagp.of{background:var(--amber);color:#3a1800}
  .car-card .tagp.pa{background:#7048e8;color:#fff}
  .car-card h4{font-size:14.5px;margin:8px 0 3px;line-height:1.25}
  .car-card p{font-size:12px;opacity:.85;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .car-card .v{font-size:11px;opacity:.7;margin-top:4px}

  /* ── Section: Comprar ────────────────────────────────────────────── */
  .comprar-inner{padding:16px 16px 0}
  .busca-cx{position:relative;margin-bottom:14px}
  .busca-cx input{
    width:100%;padding:13px 15px 13px 42px;
    border:1.5px solid var(--line);border-radius:var(--r-md);
    background:#fff;font-size:15px;color:var(--ink);
    box-shadow:var(--sh-sm);
  }
  .busca-cx input:focus{outline:none;border-color:var(--g4);box-shadow:0 0 0 3px rgba(47,129,82,.12)}
  .busca-cx .lupa{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted);pointer-events:none}
  .yt-player{margin-top:10px}
  .yt-player iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:12px;display:block}
  .filtros{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;margin-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .filtros::-webkit-scrollbar{display:none}
  .chip{
    white-space:nowrap;padding:8px 15px;border-radius:20px;
    font-size:12.5px;font-weight:700;letter-spacing:.02em;
    background:#fff;color:var(--muted);
    box-shadow:var(--sh-sm);flex-shrink:0;
    transition:.12s;
  }
  .chip.on{background:var(--g2);color:#fff;box-shadow:0 2px 8px rgba(26,74,46,.3)}
  .filtros-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}

  /* Banners */
  .banners{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
  .banner{
    border-radius:var(--r-lg);padding:18px 20px;color:#fff;
    position:relative;overflow:hidden;min-height:120px;
    display:flex;flex-direction:column;justify-content:flex-end;
    background:linear-gradient(130deg,#e08c0a,#c26900);
    box-shadow:0 6px 18px rgba(192,105,0,.3);
  }
  .banner.verde{background:linear-gradient(130deg,var(--g5),var(--g2));box-shadow:0 6px 18px rgba(26,74,46,.3)}
  .banner::after{content:"";position:absolute;right:-20px;top:-20px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.12)}
  .banner::before{content:"";position:absolute;right:12px;bottom:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.08)}
  .banner .et{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;opacity:.8;position:relative;z-index:1}
  .banner h3{font-size:20px;margin:5px 0 3px;position:relative;z-index:1;text-shadow:0 1px 6px rgba(0,0,0,.2)}
  .banner p{font-size:13px;position:relative;z-index:1;opacity:.92;max-width:82%}
  .banner .merc{font-size:11.5px;margin-top:8px;font-weight:700;position:relative;z-index:1;opacity:.9}
  .banner .val{position:absolute;bottom:12px;right:16px;font-size:10.5px;font-weight:600;opacity:.75;z-index:1}

  /* Product Grid */
  .grade{display:grid;gap:12px}
  .grade.col3{grid-template-columns:1fr 1fr}
  .prod{
    background:#fff;border-radius:var(--r-md);
    box-shadow:var(--sh-sm);overflow:hidden;
    display:flex;flex-direction:column;position:relative;
    transition:.15s;
  }
  .prod:active{transform:scale(.98);box-shadow:var(--sh-sm)}
  .prod .foto{
    height:108px;background:var(--g9);
    display:grid;place-items:center;font-size:46px;
    position:relative;
  }
  .prod .foto::after{content:"";position:absolute;bottom:0;left:0;right:0;height:24px;background:linear-gradient(transparent,rgba(0,0,0,.04))}
  .prod .selo{
    position:absolute;top:8px;left:8px;
    background:var(--red);color:#fff;
    font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;
    box-shadow:0 2px 6px rgba(192,57,43,.4);
    z-index:1;
  }
  .prod .conteudo{padding:11px 12px;flex:1;display:flex;flex-direction:column}
  .prod .pnome{font-weight:700;font-size:13.5px;color:var(--g1);line-height:1.3}
  .prod .pcat{font-size:10.5px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
  .prod .precos{margin-top:auto;padding-top:8px;display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
  .prod .pde{font-size:12px;color:var(--muted);text-decoration:line-through}
  .prod .ppor{font-size:18px;font-weight:800;color:var(--g2);font-family:var(--font-serif)}
  .prod .ppor.promo{color:var(--red)}
  .prod .add{
    margin:0 12px 12px;
    background:var(--g9);color:var(--g2);
    border-radius:var(--r-sm);padding:9px;
    font-weight:700;font-size:13px;
    transition:.15s;border:1.5px solid var(--line);
  }
  .prod .add:active{background:var(--g3);color:#fff;border-color:var(--g3)}
  .prod .add.no-carrinho{background:var(--g2);color:#fff;border-color:var(--g2)}

  /* ── Lista / Cart ────────────────────────────────────────────────── */
  .lista-inner{padding:16px}
  .titulo-secao{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}
  .titulo-secao h2{font-size:21px;color:var(--g1)}
  .titulo-secao .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .item-cart{
    background:#fff;border-radius:var(--r-md);
    box-shadow:var(--sh-sm);padding:13px 14px;
    display:flex;align-items:center;gap:11px;
    transition:.15s;
  }
  .item-cart.marcado{opacity:.5}
  .item-cart.marcado .ic-nome{text-decoration:line-through;color:var(--muted)}
  .check{
    width:24px;height:24px;border-radius:7px;
    border:2px solid var(--g5);flex-shrink:0;
    display:grid;place-items:center;cursor:pointer;
    background:#fff;transition:.12s;font-size:13px;color:transparent;
  }
  .check.on{background:var(--g3);border-color:var(--g3);color:#fff}
  .item-cart .emoji{font-size:24px;flex-shrink:0}
  .item-cart .corpo{flex:1;min-width:0}
  .item-cart .ic-nome{font-weight:700;color:var(--g1);font-size:14px;line-height:1.3}
  .item-cart .ic-meta{font-size:11.5px;color:var(--muted);margin-top:1px}
  .qtd{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .qtd button{
    width:28px;height:28px;border-radius:8px;
    background:var(--g9);color:var(--g2);
    font-weight:700;font-size:16px;line-height:1;
    display:grid;place-items:center;
  }
  .qtd button:active{background:var(--g7)}
  .qtd span{min-width:20px;text-align:center;font-weight:700;font-size:14px;color:var(--g1)}
  .item-cart .preco-l{font-weight:700;color:var(--g2);font-size:13.5px;min-width:60px;text-align:right;flex-shrink:0}
  .item-cart .lixo{color:var(--muted);font-size:17px;padding:4px;flex-shrink:0}
  .item-cart .lixo:active{color:var(--red)}
  .merc-label{font-size:12px;font-weight:800;color:var(--g3);letter-spacing:.04em;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:6px}
  .resumo{
    background:var(--g0);color:#d4edda;
    border-radius:var(--r-lg);padding:18px 20px;
    margin-top:16px;
  }
  .resumo .l{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:7px;opacity:.8}
  .resumo .total{
    font-size:22px;font-weight:800;font-family:var(--font-serif);
    display:flex;justify-content:space-between;align-items:baseline;
    border-top:1px solid rgba(255,255,255,.12);padding-top:12px;margin-top:8px;
    color:#fff;
  }
  .resumo .botoes{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}

  /* ── Histórico ────────────────────────────────────────────────────── */
  .historico-inner{padding:16px}
  .hist-cartao{background:#fff;border-radius:var(--r-md);box-shadow:var(--sh-sm);overflow:hidden;margin-bottom:10px}
  .hist-cabeca{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer}
  .hist-cabeca:active{background:var(--g9)}
  .hist-cabeca .data{font-weight:700;color:var(--g1);font-size:14px}
  .hist-cabeca .resumo-h{font-size:11.5px;color:var(--muted);margin-top:2px}
  .hist-cabeca .vtotal{font-weight:800;color:var(--g3);font-family:var(--font-serif);font-size:16px;white-space:nowrap}
  .hist-itens{padding:0 16px;max-height:0;overflow:hidden;transition:.2s}
  .hist-itens.aberto{padding:4px 16px 14px;max-height:1600px}
  .hist-itens .li{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px solid var(--g8);color:var(--ink)}
  .hist-itens .li:last-child{border-bottom:none}

  /* ── Recomendação ────────────────────────────────────────────────── */
  .reco{
    border-radius:var(--r-lg);padding:18px 20px;color:#fff;
    background:linear-gradient(140deg,var(--g4),var(--g1));
    box-shadow:0 10px 28px rgba(7,26,16,.25);margin-bottom:16px;
  }
  .reco .et{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;opacity:.8}
  .reco h3{font-size:22px;margin:5px 0 3px}
  .reco .cob{font-size:13px;opacity:.88}
  .reco .linhas{display:flex;gap:20px;flex-wrap:wrap;margin-top:12px}
  .reco .bloco .n{font-size:20px;font-weight:800;font-family:var(--font-serif)}
  .reco .bloco .r{font-size:11px;opacity:.8}
  .reco .eco{margin-top:12px;background:rgba(255,255,255,.14);border-radius:10px;padding:8px 12px;font-size:13px}
  .reco .btn-mapa{margin-top:12px;background:#fff;color:var(--g2);font-weight:700;border-radius:var(--r-sm);padding:10px 16px;font-size:13.5px;display:inline-flex;align-items:center;gap:6px}
  .comp{background:#fff;border-radius:var(--r-md);box-shadow:var(--sh-sm);overflow:hidden;margin-bottom:16px}
  .comp-tit{padding:12px 14px 4px;font-weight:700;color:var(--g2);font-size:14px;letter-spacing:.01em}
  .comp-linha{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid var(--g8)}
  .comp-linha:last-child{border-bottom:none}
  .comp-linha.melhor{background:#edf8f1}
  .comp-linha .pos{width:26px;height:26px;border-radius:50%;background:var(--g9);display:grid;place-items:center;font-size:12px;font-weight:800;color:var(--g2);flex-shrink:0}
  .comp-linha.melhor .pos{background:var(--g3);color:#fff}
  .comp-linha .corpo{flex:1;min-width:0}
  .comp-linha .corpo b{color:var(--g1);font-size:14px}
  .comp-linha .corpo .d{font-size:11px;color:var(--muted)}
  .comp-linha .tot .v{font-size:15px;font-weight:800;color:var(--g2)}
  .comp-linha .tot .s{font-size:10.5px;color:var(--muted)}

  /* ── Empty State ─────────────────────────────────────────────────── */
  .vazio{text-align:center;padding:48px 20px;color:var(--muted)}
  .vazio .ic{font-size:44px;opacity:.5;margin-bottom:12px}
  .vazio b{display:block;font-size:16px;color:var(--g2);margin-bottom:6px}
  .vazio p{font-size:14px}
  .vazio .btn{margin-top:18px}

  /* ── Modal ───────────────────────────────────────────────────────── */
  .modal-fundo{position:fixed;inset:0;background:rgba(7,26,16,.6);display:none;place-items:end center;z-index:100;backdrop-filter:blur(3px)}
  .modal-fundo.on{display:grid}
  .modal{background:#fff;border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:480px;box-shadow:0 -8px 40px rgba(0,0,0,.25);animation:sobe .25s}
  .modal-cabeca{padding:18px 20px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .modal-cabeca h3{font-size:18px;color:var(--g1)}
  .modal-cabeca .x{font-size:26px;color:var(--muted);line-height:1;padding:2px}
  .modal-corpo{padding:20px}
  .modal-pe{padding:0 20px 20px;display:flex;gap:10px;justify-content:flex-end}
  .loc-opt .ou{text-align:center;color:var(--muted);font-size:12px;margin:14px 0}

  /* ── Toast ───────────────────────────────────────────────────────── */
  .toast-area{position:fixed;top:calc(var(--nav-h) + 10px);left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:90%;max-width:360px}
  .toast{
    background:var(--g0);color:#d4edda;
    padding:12px 18px;border-radius:var(--r-md);
    font-size:13.5px;font-weight:600;
    box-shadow:0 8px 24px rgba(0,0,0,.3);
    animation:sobe .25s;display:flex;align-items:center;gap:8px;
    width:100%;
  }
  .toast.erro{background:var(--red)}

  /* ── Rodapé patrocinado ───────────────────────────────────────────── */
  .rodape-patro{margin:20px 0 0;border-top:1px solid var(--line);padding-top:12px}
  .rodape-patro .et-rod{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#7048e8;padding:0 16px 6px}

  /* ── Tags/badges ────────────────────────────────────────────────── */
  .tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px}
  .tag.promo{background:var(--red-lt);color:var(--red)}
  


  /* ── OTIMIZAÇÃO PARA APP MOBILE NATIVO ──────────────────────────── */
  
  /* Reset e base otimizada */
  body{
    font-family:var(--font-sans);
    background:var(--bg);
    color:var(--ink);
    line-height:1.5;
    min-height:100vh;
    width:100%;
    max-width:100%;
    margin:0;
    padding:0;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
  }
  
  /* Barra de navegação otimizada */
  .topo{
    background:var(--g0);
    color:#d4edda;
    height:56px;
    padding:0 12px;
    display:flex;
    align-items:center;
    gap:8px;
    position:sticky;
    top:0;
    z-index:50;
    border-bottom:1px solid rgba(255,255,255,.06);
    flex-wrap:nowrap;
  }
  
  .marca{
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:700;
    font-size:16px;
    font-family:var(--font-serif);
    letter-spacing:-.02em;
    color:#fff;
    flex-shrink:0;
  }
  
  .marca .cesta{
    width:32px;
    height:32px;
    border-radius:8px;
    background:linear-gradient(140deg,var(--g5),var(--g3));
    display:grid;
    place-items:center;
    font-size:16px;
    box-shadow:0 2px 8px rgba(0,0,0,.3);
    flex-shrink:0;
  }
  
  .topo .dir{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:6px;
    flex-wrap:nowrap;
  }
  
  .ao-vivo{
    font-size:10px;
    color:var(--g6);
    display:inline-flex;
    align-items:center;
    gap:4px;
    white-space:nowrap;
  }
  
  .ao-vivo .pt{
    width:5px;
    height:5px;
    border-radius:50%;
    background:var(--g6);
    animation:pulso 1.8s infinite;
    flex-shrink:0;
  }
  
  .quem{
    font-size:10px;
    color:rgba(212,237,218,.7);
    text-align:right;
    line-height:1.2;
    display:none;
  }
  
  .quem b{
    display:block;
    font-size:11px;
    color:#d4edda;
    font-weight:700;
  }
  
  .btn-sair{
    background:rgba(255,255,255,.12);
    color:#d4edda;
    padding:6px 10px;
    border-radius:6px;
    font-size:11px;
    font-weight:600;
    letter-spacing:.01em;
    transition:background .15s;
    min-height:32px;
    cursor:pointer;
    border:none;
  }
  
  .btn-sair:active{
    background:rgba(255,255,255,.2);
  }
  
  .loc-btn{
    display:flex;
    align-items:center;
    gap:4px;
    background:rgba(255,255,255,.12);
    color:#d4edda;
    padding:6px 10px;
    border-radius:6px;
    font-size:11px;
    font-weight:600;
    max-width:35vw;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
    transition:background .15s;
    flex-shrink:1;
    cursor:pointer;
    border:none;
    min-height:32px;
  }
  
  .loc-btn:active{
    background:rgba(255,255,255,.2);
  }
  
  /* Barra de abas otimizada */
  .barra-secoes{
    position:sticky;
    top:56px;
    z-index:40;
    background:var(--white);
    border-bottom:1px solid var(--line);
    display:flex;
    padding:0;
    box-shadow:0 1px 4px rgba(7,26,16,.04);
  }
  
  .barra-secoes button{
    flex:1;
    padding:0;
    height:56px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:3px;
    font-size:11px;
    font-weight:600;
    color:var(--muted);
    letter-spacing:.02em;
    border-bottom:3px solid transparent;
    transition:all .2s ease;
    position:relative;
    cursor:pointer;
    border:none;
    background:none;
    -webkit-user-select:none;
  }
  
  .barra-secoes button .tab-ic{
    font-size:24px;
    line-height:1;
    transition:transform .2s ease;
  }
  
  .barra-secoes button.on{
    color:var(--g2);
    border-bottom-color:var(--g4);
  }
  
  .barra-secoes button.on .tab-ic{
    transform:scale(1.15);
  }
  
  .barra-secoes button .badge{
    position:absolute;
    top:6px;
    right:calc(50% - 20px);
    min-width:20px;
    height:20px;
    padding:0 5px;
    background:var(--red);
    color:#fff;
    border-radius:10px;
    font-size:9px;
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  
  /* Main content */
  main{
    padding:0 0 calc(56px + 16px);
  }
  
  /* Botões otimizados */
  .btn{
    background:var(--g3);
    color:#fff;
    padding:12px 18px;
    border-radius:10px;
    font-weight:700;
    font-size:14px;
    letter-spacing:.01em;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:8px;
    justify-content:center;
    box-shadow:0 2px 8px rgba(15,65,40,.25);
    border:none;
    cursor:pointer;
    min-height:44px;
    -webkit-user-select:none;
  }
  
  .btn:active{
    opacity:.9;
    transform:scale(.98);
    box-shadow:0 1px 4px rgba(15,65,40,.15);
  }
  
  .btn.full{
    width:100%;
  }
  
  .btn.fantasma{
    background:transparent;
    color:var(--g3);
    box-shadow:inset 0 0 0 1.5px var(--g5);
  }
  
  .btn.fantasma:active{
    background:var(--g9);
  }
  
  .btn.peq{
    padding:8px 12px;
    font-size:12px;
    border-radius:8px;
    min-height:36px;
  }
  
  .btn:disabled{
    opacity:.4;
    cursor:not-allowed;
    transform:none;
  }
  
  /* Campos de entrada otimizados */
  .campo{
    margin-bottom:14px;
  }
  
  .campo label{
    display:block;
    font-size:11px;
    font-weight:700;
    color:var(--g2);
    margin-bottom:6px;
    letter-spacing:.04em;
    text-transform:uppercase;
  }
  
  .campo input{
    width:100%;
    padding:12px 14px;
    border:1.5px solid var(--line);
    border-radius:10px;
    background:var(--g9);
    color:var(--ink);
    font-size:16px;
    transition:all .15s ease;
    min-height:44px;
    cursor:text;
    -webkit-appearance:none;
    appearance:none;
  }
  
  .campo input:focus{
    outline:none;
    border-color:var(--g4);
    background:#fff;
    box-shadow:0 0 0 3px rgba(47,129,82,.12);
  }
  
  .campo input::placeholder{
    color:var(--muted);
  }
  
  /* Grade de produtos otimizada */
  .grade{
    display:grid;
    gap:12px;
  }
  
  .grade.col3{
    grid-template-columns:1fr 1fr;
  }
  
  /* Card de produto otimizado */
  .prod{
    background:#fff;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(7,26,16,.06);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    position:relative;
    transition:all .15s ease;
    min-height:260px;
  }
  
  .prod:active{
    transform:translateY(-2px);
    box-shadow:0 4px 12px rgba(7,26,16,.12);
  }
  
  .prod .foto{
    height:130px;
    background:var(--g9);
    display:grid;
    place-items:center;
    font-size:52px;
    position:relative;
    flex-shrink:0;
  }
  
  .prod .foto::after{
    content:"";
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    height:20px;
    background:linear-gradient(transparent,rgba(0,0,0,.02));
  }
  
  .prod .selo{
    position:absolute;
    top:8px;
    left:8px;
    background:var(--red);
    color:#fff;
    font-size:10px;
    font-weight:800;
    padding:4px 8px;
    border-radius:20px;
    box-shadow:0 2px 6px rgba(192,57,43,.4);
    z-index:1;
  }
  
  .prod .conteudo{
    padding:12px 12px;
    flex:1;
    display:flex;
    flex-direction:column;
  }
  
  .prod .pnome{
    font-weight:700;
    font-size:13px;
    color:var(--g1);
    line-height:1.3;
  }
  
  .prod .pcat{
    font-size:10px;
    color:var(--muted);
    margin-top:3px;
    text-transform:uppercase;
    letter-spacing:.05em;
  }
  
  .prod .precos{
    margin-top:auto;
    padding-top:8px;
    display:flex;
    align-items:baseline;
    gap:6px;
    flex-wrap:wrap;
  }
  
  .prod .pde{
    font-size:11px;
    color:var(--muted);
    text-decoration:line-through;
  }
  
  .prod .ppor{
    font-size:16px;
    font-weight:800;
    color:var(--g2);
    font-family:var(--font-serif);
  }
  
  .prod .ppor.promo{
    color:var(--red);
  }
  
  .prod .add{
    margin:0 12px 12px;
    background:var(--g9);
    color:var(--g2);
    border-radius:8px;
    padding:10px 12px;
    font-weight:700;
    font-size:13px;
    transition:all .15s ease;
    border:1.5px solid var(--line);
    cursor:pointer;
    min-height:40px;
    -webkit-user-select:none;
  }
  
  .prod .add:active{
    background:var(--g3);
    color:#fff;
    border-color:var(--g3);
    transform:scale(.98);
  }
  
  .prod .add.no-carrinho{
    background:var(--g2);
    color:#fff;
    border-color:var(--g2);
  }
  
  /* Seção de compra otimizada */
  .comprar-inner{
    padding:12px 12px 0;
  }
  
  .busca-cx{
    position:relative;
    margin-bottom:14px;
  }
  
  .busca-cx input{
    width:100%;
    padding:12px 14px 12px 40px;
    border:1.5px solid var(--line);
    border-radius:10px;
    background:#fff;
    font-size:16px;
    color:var(--ink);
    box-shadow:0 1px 4px rgba(7,26,16,.04);
    min-height:44px;
  }
  
  .busca-cx input:focus{
    outline:none;
    border-color:var(--g4);
    box-shadow:0 0 0 3px rgba(47,129,82,.12);
  }
  
  .busca-cx .lupa{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    font-size:16px;
    color:var(--muted);
    pointer-events:none;
  }
  
  .filtros{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:2px 0 10px;
    margin-bottom:4px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  
  .filtros::-webkit-scrollbar{
    display:none;
  }
  
  .chip{
    white-space:nowrap;
    padding:8px 14px;
    border-radius:20px;
    font-size:12px;
    font-weight:700;
    letter-spacing:.02em;
    background:#fff;
    color:var(--muted);
    box-shadow:0 1px 4px rgba(7,26,16,.04);
    flex-shrink:0;
    transition:all .12s ease;
    cursor:pointer;
    border:none;
    min-height:32px;
  }
  
  .chip.on{
    background:var(--g2);
    color:#fff;
    box-shadow:0 2px 8px rgba(26,74,46,.3);
  }
  
  .filtros-label{
    font-size:10px;
    font-weight:700;
    color:var(--muted);
    letter-spacing:.05em;
    text-transform:uppercase;
    margin-bottom:8px;
  }
  
  /* Banners otimizados */
  .banners{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:16px;
  }
  
  .banner{
    border-radius:12px;
    padding:16px 18px;
    color:#fff;
    position:relative;
    overflow:hidden;
    min-height:110px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    background:linear-gradient(130deg,#e08c0a,#c26900);
    box-shadow:0 4px 12px rgba(192,105,0,.25);
  }
  
  .banner.verde{
    background:linear-gradient(130deg,var(--g5),var(--g2));
    box-shadow:0 4px 12px rgba(26,74,46,.25);
  }
  
  .banner::after{
    content:"";
    position:absolute;
    right:-20px;
    top:-20px;
    width:110px;
    height:110px;
    border-radius:50%;
    background:rgba(255,255,255,.12);
  }
  
  .banner::before{
    content:"";
    position:absolute;
    right:12px;
    bottom:-20px;
    width:80px;
    height:80px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
  }
  
  .banner .et{
    font-size:9px;
    font-weight:800;
    letter-spacing:.12em;
    text-transform:uppercase;
    opacity:.8;
    position:relative;
    z-index:1;
  }
  
  .banner h3{
    font-size:18px;
    margin:5px 0 3px;
    position:relative;
    z-index:1;
    text-shadow:0 1px 6px rgba(0,0,0,.2);
  }
  
  .banner p{
    font-size:12px;
    position:relative;
    z-index:1;
    opacity:.92;
    max-width:85%;
  }
  
  .banner .merc{
    font-size:10px;
    margin-top:6px;
    font-weight:700;
    position:relative;
    z-index:1;
    opacity:.9;
  }
  
  /* Lista/Carrinho otimizado */
  .lista-inner{
    padding:12px 12px;
  }
  
  .titulo-secao{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
    gap:10px;
  }
  
  .titulo-secao h2{
    font-size:20px;
    color:var(--g1);
  }
  
  .titulo-secao .sub{
    font-size:12px;
    color:var(--muted);
    margin-top:2px;
  }
  
  .item-cart{
    background:#fff;
    border-radius:10px;
    box-shadow:0 1px 4px rgba(7,26,16,.04);
    padding:12px 12px;
    display:flex;
    align-items:center;
    gap:12px;
    transition:all .15s ease;
    min-height:68px;
  }
  
  .item-cart:active{
    background:var(--g9);
  }
  
  .item-cart.marcado{
    opacity:.6;
  }
  
  .item-cart.marcado .ic-nome{
    text-decoration:line-through;
    color:var(--muted);
  }
  
  .check{
    width:28px;
    height:28px;
    border-radius:6px;
    border:2px solid var(--g5);
    flex-shrink:0;
    display:grid;
    place-items:center;
    cursor:pointer;
    background:#fff;
    transition:all .12s ease;
    font-size:14px;
    color:transparent;
    min-height:28px;
  }
  
  .check.on{
    background:var(--g3);
    border-color:var(--g3);
    color:#fff;
  }
  
  .item-cart .emoji{
    font-size:28px;
    flex-shrink:0;
  }
  
  .item-cart .corpo{
    flex:1;
    min-width:0;
  }
  
  .item-cart .ic-nome{
    font-weight:700;
    color:var(--g1);
    font-size:13px;
    line-height:1.3;
  }
  
  .item-cart .ic-meta{
    font-size:11px;
    color:var(--muted);
    margin-top:2px;
  }
  
  .qtd{
    display:flex;
    align-items:center;
    gap:6px;
    flex-shrink:0;
  }
  
  .qtd button{
    width:32px;
    height:32px;
    border-radius:6px;
    background:var(--g9);
    color:var(--g2);
    font-weight:700;
    font-size:16px;
    line-height:1;
    display:grid;
    place-items:center;
    cursor:pointer;

/* ====== utilidades de comparação/distância ====== */
function norm(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g," ").trim();}
const precoEf=p=>(p.emPromocao&&p.precoPromocional>0)?p.precoPromocional:p.preco;
function distKm(a,b){
  if(!a||!b||a.lat==null||b.lat==null) return null;
  const R=6371,r=Math.PI/180,dLat=(b.lat-a.lat)*r,dLng=(b.lng-a.lng)*r;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
const distLabel=k=>k==null?"—":(k<1?`${Math.round(k*1000)} m`:`${k.toFixed(1)} km`);
function mesmaCoisa(a,b){
  const x=norm(a),y=norm(b);
  if(!x||!y) return false;
  if(x===y) return true;
  if(x.length>=4&&y.includes(x))return true;
  if(y.length>=4&&x.includes(y))return true;
  const px=x.split(" ").filter(w=>w.length>2),py=y.split(" ").filter(w=>w.length>2);
  const comuns=px.filter(w=>py.includes(w));
  return comuns.length>=2 && comuns.length>=Math.min(px.length,py.length)-1;
}

/* ====== sincronismo em nuvem (tempo real) ======
   ouve mudanças de produtos, ofertas e supermercados feitas no Gerencial
   e atualiza a tela do cliente automaticamente */
function ligarSincronismo(){
  unsubMercados=onSnapshot(collection(db,"supermercados"),snap=>{
    cacheMercados={}; snap.docs.forEach(d=>cacheMercados[d.id]={id:d.id,...d.data()});
    if(sessao && abaCliente==="comprar") renderComprar();
  });
  unsubProdutos=onSnapshot(collection(db,"produtos"),snap=>{
    cacheProdutos=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(sessao && abaCliente==="comprar") renderGradeProdutos();
  });
  unsubOfertas=onSnapshot(collection(db,"ofertas"),snap=>{
    cacheOfertas=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(sessao && abaCliente==="comprar") renderBanners();
  });
  unsubPatro=onSnapshot(collection(db,"patrocinados"),snap=>{
    cachePatrocinados=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(sessao) montarRodapePatro();
  },err=>{ /* coleção pode não ter permissão ainda */ });
  unsubPedidos=onSnapshot(query(collection(db,"pedidos"),where("clienteId","==",sessao.id)),snap=>{
    const novos=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.criadoEm||0)-(a.criadoEm||0));
    novos.forEach(p=>{
      const ant=_pedStatus[p.id];
      if(ant && ant!==p.status){
        const nomeLoja=cacheMercados[p.supermercadoId]?.nome||"a loja";
        if(p.status==="confirmado") toast(`✅ Pedido confirmado por ${nomeLoja}!`);
        else if(p.status==="recusado") toast(`❌ Pedido recusado por ${nomeLoja}.`,true);
      }
      _pedStatus[p.id]=p.status;
    });
    cachePedidos=novos;
    if(sessao && abaCliente==="historico") renderHistorico();
  },err=>{ /* permissão pode faltar */ });
}

function renderGradeProdutos(){
  const g=$("#grade-prod"); if(!g) return;
  let lista=cacheProdutos.slice();
  if(filtroMerc!=="todos") lista=lista.filter(p=>p.supermercadoId===filtroMerc);
  if(filtroCat!=="todas") lista=lista.filter(p=>p.categoria===filtroCat);
  if(termoBusca.trim()){
    const t=termoBusca.toLowerCase();
    lista=lista.filter(p=>{
      const precoStr=String(p.preco??"")+" "+String(p.precoPromocional??"");
      return p.nome.toLowerCase().includes(t)
        || (p.categoria||"").toLowerCase().includes(t)
        || (p.marca||"").toLowerCase().includes(t)
        || precoStr.replace(".",",").includes(t)
        || precoStr.includes(t);
    });
  }
  lista.sort((a,b)=>(b.emPromocao?1:0)-(a.emPromocao?1:0));

  if(!lista.length){ g.style.display="block"; g.innerHTML=vazioHTML("🔍","Nada encontrado","Tente outro termo, categoria ou supermercado"); return; }
  g.style.display=""; g.className="grade col3";
  g.innerHTML=lista.map(p=>{
    const promo=p.emPromocao&&p.precoPromocional;
    const m=cacheMercados[p.supermercadoId];
    const noCarrinho=carrinho.find(i=>i.produtoId===p.id);
    const fotoHtml=p.foto
      ? `<img src="${p.foto}" alt="${esc(p.nome)}" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:inherit">`
      : `${p.emoji||"🛒"}`;
    return `<div class="prod">
      <div class="foto">${promo?`<span class="selo">${Math.round((1-p.precoPromocional/p.preco)*100)}% OFF</span>`:""}${fotoHtml}</div>
      <div class="conteudo">
        <div class="pnome">${esc(p.nome)}</div>
        ${p.marca?`<div class="pmarca" style="font-size:11px;color:var(--muted);font-weight:600">${esc(p.marca)}</div>`:""}
        <div class="pcat">${m?esc(m.nome):""} · ${esc(p.categoria||"")}</div>
        <div class="precos">${promo?`<span class="pde">${reais(p.preco)}</span><span class="ppor promo">${reais(p.precoPromocional)}</span>`:`<span class="ppor">${reais(p.preco)}</span>`}</div>
      </div>
      <button class="add ${noCarrinho?'no-carrinho':''}" onclick="addCarrinho('${p.id}')">${noCarrinho?`✓ na lista (${noCarrinho.qtd})`:"+ Adicionar"}</button>
    </div>`;
  }).join("");
}

function addCarrinho(produtoId){
  const p=cacheProdutos.find(x=>x.id===produtoId); if(!p) return;
  const preco=(p.emPromocao&&p.precoPromocional)?p.precoPromocional:p.preco;
  const m=cacheMercados[p.supermercadoId];
  const ex=carrinho.find(i=>i.produtoId===produtoId);
  if(ex) ex.qtd++;
  else carrinho.push({produtoId,nome:p.nome,emoji:p.emoji,categoria:p.categoria,preco,
    supermercadoId:p.supermercadoId,mercadoNome:m?m.nome:"",mercadoEmoji:m?m.emoji:"🏬",qtd:1,marcado:false});
  toast(`${p.nome} na lista`);
  renderGradeProdutos();
  const btn=document.querySelectorAll(".barra-secoes button")[1];
  const n=carrinho.reduce((s,i)=>s+i.qtd,0);
  if(btn) btn.innerHTML=`🧺 Minha lista${n?` (${n})`:""}`;
}

    html+=`<div class="merc-label">${itens[0].mercadoEmoji||"🏬"} ${esc(merc||"Loja")}</div><div class="grade" style="margin-bottom:16px">`;

        <div class="corpo"><div class="ic-nome">${esc(i.nome)}</div><div class="ic-meta">${esc(i.categoria||"")} · ${reais(i.preco)} cada</div></div>
        <div class="qtd"><button onclick="mudarQtd(${i.idx},-1)">−</button><span>${i.qtd}</span><button onclick="mudarQtd(${i.idx},1)">+</button></div>
        <div class="preco-l">${reais(i.preco*i.qtd)}</div>
        <button class="lixo" onclick="removerItem(${i.idx})">🗑</button>

  html+=`<div class="resumo">

function mudarQtd(idx,d){ carrinho[idx].qtd+=d; if(carrinho[idx].qtd<=0) carrinho.splice(idx,1); telaCliente(); }
function removerItem(idx){ carrinho.splice(idx,1); telaCliente(); }
function limparLista(){ if(!carrinho.length)return; confirmar("Limpar lista","Remove todos os itens da lista atual.",async()=>{carrinho=[];telaCliente();},"Limpar"); }

function baixarLista(){
  if(!carrinho.length) return toast("Lista vazia.",true);
  const data=new Date().toLocaleDateString("pt-BR");
  let txt=`LISTA DE COMPRAS — Cesta\nCliente: ${sessao.nome}\nData: ${data}\n`+"=".repeat(40)+"\n\n";
  const grupos={}; carrinho.forEach(i=>{(grupos[i.mercadoNome]??=[]).push(i);});
  let total=0;
  for(const [merc,itens] of Object.entries(grupos)){
    txt+=`${merc||"Loja"}\n`;
    for(const i of itens){ const sub=i.preco*i.qtd; total+=sub; txt+=`  [${i.marcado?"x":" "}] ${i.qtd}x ${i.nome}  —  ${reais(sub)}\n`; }
    txt+="\n";
  }
  txt+="=".repeat(40)+`\nTOTAL ESTIMADO: ${reais(total)}\n`;
  const blob=new Blob([txt],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download=`lista-compras-${data.replace(/\//g,"-")}.txt`; a.click(); URL.revokeObjectURL(url);
  toast("Lista baixada.");
}

/*
 * Envia o pedido apenas para os supermercadoId presentes em `idsPermitidos`.
 * Isso garante que a lista nunca seja enviada para mais de um supermercado
 * quando o cliente optar por escolher manualmente apenas 1 loja; e permite
 * o envio "para o vencedor" quando o cliente aceita a sugestão.
 * Itens cujo supermercadoId não esteja em idsPermitidos voltam a ficar pendentes
 * na lista (não são removidos do carrinho).
 */
async function _enviarPedidoParaLojas(idsPermitidos){
  const setPermitidos=new Set(idsPermitidos);
  const itensEnviar=carrinho.filter(i=>i.supermercadoId && setPermitidos.has(i.supermercadoId));
  if(!itensEnviar.length) return {pedidosCriados:0,erros:["sem-itens"],enviosZap:[]};

  const total=itensEnviar.reduce((s,i)=>s+i.preco*i.qtd,0);
  const agora=Date.now();
  const grupos={};
  itensEnviar.forEach(i=>{ (grupos[i.supermercadoId]??=[]).push(i); });

  await _salvarHistoricoCompra(total);

  const enviosZap=[];
  let pedidosCriados=0;
  const erros=[];
  for(const [sid,itens] of Object.entries(grupos)){
    const totalGrupo=itens.reduce((s,i)=>s+i.preco*i.qtd,0);
    const m = cacheMercados[sid] || null;
    try{
      const pid=await fsAdd("pedidos",{
        clienteId:sessao.id, clienteNome:sessao.nome, clienteEmail:sessao.email||"", clienteTelefone:sessao.telefone||"",
        supermercadoId:sid,
        itens:itens.map(i=>({produtoId:i.produtoId||null,nome:i.nome,qtd:i.qtd,preco:i.preco,emoji:i.emoji||"🛒"})),
        total:totalGrupo, status:"aguardando", data:new Date().toISOString(), criadoEm:agora, atualizadoEm:agora
      });
      console.log("Pedido criado",pid,"→ supermercadoId:",sid,"loja:",m?m.nome:"(desconhecida)");
      pedidosCriados++;
    }catch(e){ console.error("Falha ao criar pedido para",sid,e); erros.push(e.code||e.message||String(e)); }

    if(m && m.whatsapp){
      const linhas=itens.map(i=>`• ${i.qtd}x ${i.nome} — ${reais(i.preco*i.qtd)}`).join("\n");
      const texto=`🧺 *Novo pedido — Cesta*\n*Cliente:* ${sessao.nome}\n${sessao.telefone?`*Tel:* ${sessao.telefone}\n`:""}\n*${m.nome}*\n${linhas}\n\n*Total:* ${reais(totalGrupo)}`;
      const link=zapLink(m.whatsapp,texto);
      if(link) enviosZap.push({nome:m.nome,emoji:m.emoji||"🏬",link});
    }
  }

  // remove do carrinho só o que foi efetivamente enviado
  if(pedidosCriados>0){
    carrinho=carrinho.filter(i=>!(i.supermercadoId && setPermitidos.has(i.supermercadoId)));
  }

  return {pedidosCriados,erros,enviosZap};
}

function _modalResultadoPedido({pedidosCriados,erros,enviosZap}){
  if(pedidosCriados===0 && erros.length){
    const permissao=erros.some(x=>/permission|insufficient/i.test(x));
    toast(permissao
      ? "Pedido não enviado: o Firestore bloqueou a coleção 'pedidos'. Publique as regras."
      : (erros[0]==="sem-itens" ? "Nenhum item dessa loja na lista." : "Pedido não enviado: "+erros[0]), true);
    return;
  }
  const semMercado=carrinho.filter(i=>!i.supermercadoId).length;
  const restantes=carrinho.length;
  const avisoSem = semMercado ? `<p style="color:var(--muted);font-size:12.5px;margin-bottom:10px">⚠️ ${semMercado} item(ns) sem loja vinculada (adicionados por "Repetir") não geraram pedido. Re-adicione pela aba Comprar para enviá-los.</p>` : "";
  const avisoRestante = (restantes && restantes>semMercado) ? `<p style="color:var(--muted);font-size:12.5px;margin-bottom:10px">ℹ️ Os demais itens da lista continuam pendentes — finalize novamente para enviá-los a outra loja.</p>` : "";
  const corpoZap = enviosZap.length
    ? `<p style="color:var(--muted);font-size:14px;margin-bottom:12px">Envie a lista direto pelo WhatsApp da loja para agilizar o atendimento:</p>`
      + enviosZap.map(e=>`<a class="btn full" style="background:#25D366;margin-bottom:8px;display:block;text-align:center" href="${e.link}" target="_blank" rel="noopener">📲 Enviar para ${esc(e.emoji+" "+e.nome)}</a>`).join("")
    : `<p style="color:var(--muted);font-size:14px">A loja escolhida ainda não tem WhatsApp cadastrado, mas o pedido foi registrado e ela o verá no painel.</p>`;
  abrirModal("✅ Pedido enviado!",
    `<p style="color:var(--g1);font-size:14.5px;margin-bottom:14px">Sua lista foi enviada ao supermercado. Você receberá a confirmação aqui no app e pode acompanhar o status na aba <b>Histórico</b>.</p>${avisoSem}${avisoRestante}${corpoZap}`,
    `<button class="btn" onclick="fecharModal()">Concluir</button>`);
  abaCliente="historico"; telaCliente();
}

/* Aceitar a sugestão do card de recomendação → envia só para o supermercado vencedor */
async function aceitarSugestao(){
  const recos=calcularRecomendacao();
  if(!recos.length) return toast("Adicione produtos para receber uma sugestão.",true);
  const best=recos[0];
  confirmar("Confirmar envio",
    `Enviar a lista para ${best.loja.nome}? Apenas os itens disponíveis nessa loja serão enviados; os demais permanecerão na sua lista.`,
    async()=>{ const r=await _enviarPedidoParaLojas([best.loja.id]); _modalResultadoPedido(r); },
    "Aceitar e enviar");
}

/* Não aceitar a sugestão → cliente escolhe individualmente 1 única loja para enviar */
function escolherLojaManual(){
  const grupos={};
  carrinho.forEach(i=>{ if(i.supermercadoId) (grupos[i.supermercadoId]??=[]).push(i); });
  const ids=Object.keys(grupos);
  if(!ids.length) return toast("Nenhum item da lista está vinculado a uma loja.",true);

  const linhas=ids.map(sid=>{
    const m=cacheMercados[sid]; const itens=grupos[sid];
    const totalLoja=itens.reduce((s,i)=>s+i.preco*i.qtd,0);
    const nome=m?m.nome:"Loja desconhecida"; const emoji=m?(m.emoji||"🏬"):"🏬";

    `<button class="btn fantasma" onclick="fecharModal()">Cancelar</button>`);
}

async function confirmarEnvioLojaUnica(sid){
  const m=cacheMercados[sid]; const nome=m?m.nome:"essa loja";
  fecharModal();
  confirmar("Confirmar envio",
    `Enviar a lista apenas para ${nome}? A lista não será enviada para nenhuma outra loja.`,
    async()=>{ const r=await _enviarPedidoParaLojas([sid]); _modalResultadoPedido(r); },
    "Enviar pedido");
}

async function finalizarCompra(){
  if(!carrinho.length) return toast("Lista vazia.",true);
  const recos=calcularRecomendacao();
  if(!recos.length) return toast("Nenhum item da lista está vinculado a uma loja.",true);
  const best=recos[0];

  abrirModal("Para onde enviar o pedido?",
    `<p style="color:var(--g1);font-size:14.5px;margin-bottom:14px">Sugerimos <b>${esc(best.loja.nome)}</b> como o melhor lugar para comprar tudo. Você pode aceitar a sugestão ou escolher manualmente para qual loja enviar — a lista nunca é enviada para mais de uma loja ao mesmo tempo.</p>`,

}

function toggleHist(k){ $("#hist-"+k)?.classList.toggle("aberto"); }
function repetirCompra(k){
  const h=window.__hist?.[k]; if(!h) return;
  h.itens.forEach(it=>{
    const ex=carrinho.find(i=>i.nome===it.nome&&i.mercadoNome===it.mercadoNome);

    else{

}

function montarCarrossel(nome,cards){
  const trilho=$("#"+nome+"-car"); if(!trilho) return;

  if(!cards.length){ trilho.innerHTML=`<div class="car-card" style="opacity:.75"><h4>Sem ofertas no momento</h4><p>Volte em breve para novas promoções.</p></div>`; CAR[nome]={idx:0,n:1,timer:null}; return; }
  trilho.innerHTML=cards.map(cardCarrosselHTML).join("");
  CAR[nome]={idx:0,n:cards.length,timer:null};

function passoCarrossel(nome){
  const trilho=$("#"+nome+"-car"),st=CAR[nome]; if(!trilho||!st) return;
  st.idx=(st.idx+1)%st.n; const card=trilho.children[0]; if(!card) return;
  trilho.style.transform=`translateX(${-st.idx*(card.getBoundingClientRect().width+13)}px)`;
}
function iniciarCarrossel(nome){ const st=CAR[nome]; if(!st) return; pararCarrossel(nome); st.timer=setInterval(()=>passoCarrossel(nome),4200); }
function pararCarrossel(nome){ if(CAR[nome]&&CAR[nome].timer){clearInterval(CAR[nome].timer);CAR[nome].timer=null;} }
function carMover(nome,dir){
  const trilho=$("#"+nome+"-car"),st=CAR[nome]; if(!trilho||!st) return;
  st.idx=(st.idx+dir+st.n)%st.n; const card=trilho.children[0]; if(!card) return;
  trilho.style.transform=`translateX(${-st.idx*(card.getBoundingClientRect().width+13)}px)`;
  iniciarCarrossel(nome);
}

/* ====== LOCALIZAÇÃO DO CLIENTE ====== */
function atualizarLocLabel(){ const l=$("#loc-label"); if(l) l.textContent=localCliente?localCliente.label:"definir local"; }
function abrirLocal(){
  abrirModal("Sua localização",`
    <p style="color:var(--muted);font-size:14px;margin-bottom:14px">Usamos sua localização só para mostrar os mercados mais próximos e calcular distâncias na recomendação.</p>
    <div class="loc-opt">
      <button class="btn full" id="loc-gps">📍 Usar minha localização atual</button>
      <div class="ou">— ou informe seu CEP —</div>
      <div class="campo"><input id="loc-cep" placeholder="00000-000" inputmode="numeric" maxlength="9" value="${localCliente&&localCliente.cep?esc(localCliente.cep):""}"></div>
      <button class="btn fantasma full" id="loc-cep-btn">Buscar pelo CEP</button>
    </div>
    <div id="loc-status" style="font-size:13px;margin-top:14px;text-align:center;color:var(--muted)"></div>
  `);
  const st=$("#loc-status");
  $("#loc-gps").onclick=()=>{
    if(!navigator.geolocation){ st.textContent="Seu navegador não suporta geolocalização."; return; }
    st.textContent="Obtendo localização…";
    navigator.geolocation.getCurrentPosition(
      pos=>{ localCliente={lat:pos.coords.latitude,lng:pos.coords.longitude,label:"minha localização"}; salvarLocal(); atualizarLocLabel(); toast("Localização definida."); fecharModal(); telaCliente(); },
      ()=>{ st.textContent="Não foi possível obter sua localização. Use o CEP."; },
      {enableHighAccuracy:true,timeout:9000}
    );
  };
  $("#loc-cep-btn").onclick=async()=>{
    const cep=$("#loc-cep").value.replace(/\D/g,"");
    if(cep.length!==8){ st.textContent="CEP deve ter 8 dígitos."; return; }
    st.textContent="Buscando…";
    try{
      const r=await fetch(`https://viacep.com.br/ws/${cep}/json/`); const j=await r.json();
      if(j.erro){ st.textContent="CEP não encontrado."; return; }
      let geo=null;
      try{ const g=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=br&q=${encodeURIComponent(`${j.bairro}, ${j.localidade}, ${j.uf}, Brasil`)}`); const gj=await g.json(); if(gj.length) geo={lat:parseFloat(gj[0].lat),lng:parseFloat(gj[0].lon)}; }catch(e){}
      if(!geo){ try{ const g=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=br&q=${encodeURIComponent(`${j.localidade}, ${j.uf}, Brasil`)}`); const gj=await g.json(); if(gj.length) geo={lat:parseFloat(gj[0].lat),lng:parseFloat(gj[0].lon)}; }catch(e){} }
      if(!geo){ st.textContent="Achei o CEP, mas não a localização exata. Tente o GPS."; return; }
      localCliente={lat:geo.lat,lng:geo.lng,cep,label:`${j.bairro?j.bairro+", ":""}${j.localidade}/${j.uf}`};
      salvarLocal(); atualizarLocLabel(); toast("Localização definida."); fecharModal(); telaCliente();
    }catch(e){ st.textContent="Erro ao buscar o CEP. Tente novamente."; }
  };
}

/* ====== RECOMENDAÇÃO: melhor lugar para comprar ====== */
function calcularRecomendacao(){
  const itens=carrinho; if(!itens.length) return [];
  const resultados=Object.values(cacheMercados).map(m=>{
    const prodsLoja=cacheProdutos.filter(p=>p.supermercadoId===m.id);
    let total=0; const encontrados=[],faltando=[];
    for(const it of itens){
      const cands=prodsLoja.filter(p=>mesmaCoisa(p.nome,it.nome));
      if(cands.length){ const melhor=cands.reduce((a,b)=>precoEf(a)<=precoEf(b)?a:b); total+=precoEf(melhor)*(it.qtd||1); encontrados.push(it); }
      else faltando.push(it);
    }
    const d=distKm(localCliente,(m.lat!=null)?{lat:m.lat,lng:m.lng}:null);
    return {loja:m,total,cobertura:encontrados.length,faltando,dist:d};
  }).filter(r=>r.cobertura>0);
  resultados.sort((a,b)=>{
    if(b.cobertura!==a.cobertura) return b.cobertura-a.cobertura;
    if(a.total!==b.total) return a.total-b.total;
    if(a.dist==null&&b.dist==null) return 0; if(a.dist==null) return 1; if(b.dist==null) return -1; return a.dist-b.dist;
  });
  return resultados;
}
function recomendacaoHTML(){
  const recos=calcularRecomendacao();
  const nItensDistintos=carrinho.length;
  if(!recos.length) return `<div class="cartao" style="text-align:center;color:var(--muted);margin-bottom:16px">Adicione produtos para ver o melhor lugar para comprar.</div>`;
  const best=recos[0];
  const completos=recos.filter(r=>r.cobertura===nItensDistintos);
  const base=completos.length?completos:recos;
  const economia=Math.max(...base.map(r=>r.total))-best.total;
  let html=`<div class="reco">
    <div class="et">🏆 Melhor lugar para comprar</div>
    <h3>${best.loja.emoji||"🏬"} ${esc(best.loja.nome)}</h3>
    <div class="cob">${best.cobertura} de ${nItensDistintos} itens disponíveis aqui${best.faltando.length?` · falta: ${best.faltando.map(f=>esc(f.nome)).join(", ")}`:""}</div>
    <div class="linhas">
      <div class="bloco"><div class="n">${reais(best.total)}</div><div class="r">total estimado</div></div>
      <div class="bloco"><div class="n">${distLabel(best.dist)}</div><div class="r">${localCliente?"distância":"defina seu local"}</div></div>
    </div>
    ${economia>0.01?`<div class="eco">💰 Economia de até <b>${reais(economia)}</b> frente ao mercado mais caro.</div>`:""}
    <div class="reco-acoes">
      <button class="btn reco-aceitar" onclick="aceitarSugestao()">✓ Aceitar sugestão</button>
      ${recos.length>1?`<button class="btn reco-recusar" onclick="escolherLojaManual()">Não aceitar</button>`:""}
    </div>
    ${best.loja.lat!=null?`<a class="btn btn-mapa" href="https://www.google.com/maps/dir/?api=1&destination=${best.loja.lat},${best.loja.lng}" target="_blank">🗺️ Como chegar</a>`:`<button class="btn btn-mapa" onclick="abrirLocal()">📍 Definir minha localização</button>`}
  </div>`;
  if(recos.length>1){
    html+=`<div class="comp"><div class="comp-tit">Comparar mercados</div>`;
    recos.forEach((r,i)=>{
      html+=`<div class="comp-linha ${i===0?'melhor':''}">
        <div class="pos">${i===0?'🏆':i+1}</div>
        <div class="corpo"><b>${esc(r.loja.nome)}</b><div class="d">${r.cobertura}/${nItensDistintos} itens${r.faltando.length?` · falta ${r.faltando.length}`:" · completo"} · ${distLabel(r.dist)}</div></div>
        <div class="tot"><div class="v">${reais(r.total)}</div><div class="s">estimado</div></div>
      </div>`;
    });
    html+=`</div>`;
  }
  return html;
}

}

Object.assign(window,{
  trocarAba,fazerLogin,criarConta,sair,irCliente,setFiltroMerc,setFiltroCat,buscar,

  toggleHist,repetirCompra,fecharModal,carMover,abrirLocal,
  aceitarSugestao,escolherLojaManual,confirmarEnvioLojaUnica
});

  try{
    await semearCliente();
    carregarLocal();
    // pré-carrega mercados, ofertas e patrocinadas p/ o cabeçalho e carrossel da tela de login
    try{
      const [merc,ofs,pat]=await Promise.all([fsAll("supermercados"),fsAll("ofertas"),fsAll("patrocinados").catch(()=>[])]);
      cacheMercados={}; merc.forEach(m=>cacheMercados[m.id]=m);
      cacheOfertas=ofs; cachePatrocinados=pat;
    }catch(e){ console.warn("pré-carga de ofertas falhou",e); }
    const s=(()=>{try{return JSON.parse(localStorage.getItem("cesta_c_sessao"));}catch(e){return null;}})();
    if(s){
      const conta=await fsGet("clientes",s.id);
      if(conta){ sessao={id:conta.id,nome:conta.nome,email:conta.email||"",telefone:conta.telefone||""}; entrarApp(); }
      else { montarPortalOfertas(); $("#tela-portal").classList.remove("escondido"); }
    }else { montarPortalOfertas(); $("#tela-portal").classList.remove("escondido"); }
  }catch(e){
    console.error(e);
    document.getElementById("carregando").innerHTML=`<div style="text-align:center;padding:30px;max-width:420px">
      <div style="font-size:40px">☁️⚠️</div>
      <h2 style="color:var(--g1);margin:10px 0">Sem conexão com a nuvem</h2>
      <p style="color:var(--muted);font-size:14px">Verifique a internet e as <b>regras do Firestore</b>. Detalhe: ${esc(e.message||e)}</p></div>`;
    return;
  }
  document.getElementById("carregando").style.display="none";
})();
