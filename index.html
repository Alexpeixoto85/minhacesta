/* ====== ABA COMPRAR ====== */
function renderComprar(){
  const c=$("#cliente-corpo");
  if(!c) return;
  const merc=Object.values(cacheMercados);
  const categorias=[...new Set(cacheProdutos.map(p=>p.categoria))].sort();
  const chipsMerc=`<button class="chip ${filtroMerc==='todos'?'on':''}" onclick="setFiltroMerc('todos')">Todos</button>`
    + merc.map(m=>`<button class="chip ${filtroMerc===m.id?'on':''}" onclick="setFiltroMerc('${m.id}')">${m.emoji||"🏬"} ${esc(m.nome)}</button>`).join("");
  const chipsCat=`<button class="chip ${filtroCat==='todas'?'on':''}" onclick="setFiltroCat('todas')">Todas</button>`
    + categorias.map(cat=>`<button class="chip ${filtroCat===cat?'on':''}" onclick="setFiltroCat('${esc(cat)}')">${esc(cat)}</button>`).join("");

  c.innerHTML=`
    <div class="comprar-inner">
    <div id="area-banners"></div>
    <div class="busca-cx"><span class="lupa">🔍</span><input id="busca" placeholder="Buscar por nome, marca ou preço..." value="${esc(termoBusca)}" oninput="buscar(this.value)"></div>
    <div class="filtros-label">Supermercado</div>
    <div class="filtros">${chipsMerc}</div>
    <div class="filtros-label">Categoria</div>
    <div class="filtros">${chipsCat}</div>
    <div id="grade-prod" class="grade col3"></div>
    </div>`;
  renderBanners();
  renderGradeProdutos();
}
function setFiltroMerc(v){ filtroMerc=v; renderComprar(); }
function setFiltroCat(v){ filtroCat=v; renderComprar(); }
let buscaTimer;
function buscar(v){ termoBusca=v; clearTimeout(buscaTimer); buscaTimer=setTimeout(renderGradeProdutos,160); }

function renderBanners(){
  const box=$("#area-banners"); if(!box) return;
  if(!cacheOfertas.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="banners">`+cacheOfertas.map(o=>{
    const m=cacheMercados[o.supermercadoId];
    return `<div class="banner ${o.cor==='verde'?'verde':''}">
      <div class="et">Oferta especial</div><h3>${esc(o.titulo)}</h3><p>${esc(o.descricao||"")}</p>
      <div class="merc">${m?(m.emoji||"🏬")+" "+esc(m.nome):""}</div>
      ${o.validade?`<span class="val">${esc(o.validade)}</span>`:""}
      ${ytEmbed(o.youtube)}
    </div>`;
  }).join("")+`</div>`;
}

function renderGradeProdutos(){
  const g=$("#grade-prod"); if(!g) return;
  let lista=cacheProdutos.slice();
  if(filtroMerc!=="todos") lista=lista.filter(p=>p.supermercadoId===filtroMerc);
  if(filtroCat!=="todas") lista=lista.filter(p=>p.categoria===filtroCat);
  if(termoBusca.trim()){
    const t=termoBusca.toLowerCase();
    lista=lista.filter(p=>{
      const precoStr=String(p.preco??"")+" "+String(p.precoPromocional??"");
      return p.nome.toLowerCase().includes(t)
        || (p.categoria||"").toLowerCase().includes(t)
        || (p.marca||"").toLowerCase().includes(t)
        || precoStr.replace(".",",").includes(t)
        || precoStr.includes(t);
    });
  }
  lista.sort((a,b)=>(b.emPromocao?1:0)-(a.emPromocao?1:0));

  if(!lista.length){ g.style.display="block"; g.innerHTML=vazioHTML("🔍","Nada encontrado","Tente outro termo, categoria ou supermercado"); return; }
  g.style.display=""; g.className="grade col3";
  g.innerHTML=lista.map(p=>{
    const promo=p.emPromocao&&p.precoPromocional;
    const m=cacheMercados[p.supermercadoId];
    const noCarrinho=carrinho.find(i=>i.produtoId===p.id);
    const fotoHtml=p.foto
      ? `<img src="${p.foto}" alt="${esc(p.nome)}" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:inherit">`
      : `${p.emoji||"🛒"}`;
    return `<div class="prod">
      <div class="foto">${promo?`<span class="selo">${Math.round((1-p.precoPromocional/p.preco)*100)}% OFF</span>`:""}${fotoHtml}</div>
      <div class="conteudo">
        <div class="pnome">${esc(p.nome)}</div>
        ${p.marca?`<div class="pmarca" style="font-size:11px;color:var(--muted);font-weight:600">${esc(p.marca)}</div>`:""}
        <div class="pcat">${m?esc(m.nome):""} · ${esc(p.categoria||"")}</div>
        <div class="precos">${promo?`<span class="pde">${reais(p.preco)}</span><span class="ppor promo">${reais(p.precoPromocional)}</span>`:`<span class="ppor">${reais(p.preco)}</span>`}</div>
      </div>
      <button class="add ${noCarrinho?'no-carrinho':''}" onclick="addCarrinho('${p.id}')">${noCarrinho?`✓ na lista (${noCarrinho.qtd})`:"+ Adicionar"}</button>
    </div>`;
  }).join("");
}

function addCarrinho(produtoId){
  const p=cacheProdutos.find(x=>x.id===produtoId); if(!p) return;
  const preco=(p.emPromocao&&p.precoPromocional)?p.precoPromocional:p.preco;
  const m=cacheMercados[p.supermercadoId];
  const ex=carrinho.find(i=>i.produtoId===produtoId);
  if(ex) ex.qtd++;
  else carrinho.push({produtoId,nome:p.nome,emoji:p.emoji,categoria:p.categoria,preco,
    supermercadoId:p.supermercadoId,mercadoNome:m?m.nome:"",mercadoEmoji:m?m.emoji:"🏬",qtd:1,marcado:false});
  toast(`${p.nome} na lista`);
  renderGradeProdutos();
  const btn=document.querySelectorAll(".barra-secoes button")[1];
  const n=carrinho.reduce((s,i)=>s+i.qtd,0);
  if(btn) btn.innerHTML=`🧺 Minha lista${n?` (${n})`:""}`;
}

/* ====== ABA LISTA / CARRINHO ====== */
function renderLista(){
  const c=$("#cliente-corpo");
  if(!carrinho.length){
    c.innerHTML=`<div class="lista-inner"><div class="titulo-secao"><div><h2>Minha lista de compras</h2><div class="sub">Monte sua lista na aba Comprar</div></div></div>
      ${vazioHTML("🧺","Sua lista está vazia","Adicione produtos e marque cada item conforme coloca no carrinho","irCliente('comprar')","🛍️ Ir às compras")}</div>`;
    return;
  }
  const grupos={}; carrinho.forEach((i,idx)=>{(grupos[i.mercadoNome]??=[]).push({...i,idx});});
  const total=carrinho.reduce((s,i)=>s+i.preco*i.qtd,0);
  const marcados=carrinho.filter(i=>i.marcado);
  const totalMarcado=marcados.reduce((s,i)=>s+i.preco*i.qtd,0);
  const nItens=carrinho.reduce((s,i)=>s+i.qtd,0);

  let html=`<div class="lista-inner"><div class="titulo-secao"><div><h2>Minha lista</h2><div class="sub">Marque o que já pegou no mercado</div></div>
    <button class="btn fantasma peq" onclick="limparLista()">Limpar</button></div>`;
  html+=recomendacaoHTML();
  for(const [merc,itens] of Object.entries(grupos)){
    html+=`<div class="merc-label">${itens[0].mercadoEmoji||"🏬"} ${esc(merc||"Loja")}</div><div class="grade" style="margin-bottom:16px">`;
    for(const i of itens){
      html+=`<div class="item-cart ${i.marcado?'marcado':''}">
        <div class="check ${i.marcado?'on':''}" onclick="marcarItem(${i.idx})">${i.marcado?'✓':''}</div>
        <div class="emoji">${i.emoji||"🛒"}</div>
        <div class="corpo"><div class="ic-nome">${esc(i.nome)}</div><div class="ic-meta">${esc(i.categoria||"")} · ${reais(i.preco)} cada</div></div>
        <div class="qtd"><button onclick="mudarQtd(${i.idx},-1)">−</button><span>${i.qtd}</span><button onclick="mudarQtd(${i.idx},1)">+</button></div>
        <div class="preco-l">${reais(i.preco*i.qtd)}</div>
        <button class="lixo" onclick="removerItem(${i.idx})">🗑</button>
      </div>`;
    }
    html+=`</div>`;
  }
  html+=`<div class="resumo">
      <div class="l"><span>Itens na lista</span><span>${nItens}</span></div>
      <div class="l"><span>Já no carrinho (${marcados.length})</span><span>${reais(totalMarcado)}</span></div>
      <div class="total"><span>Total estimado</span><span>${reais(total)}</span></div>
      <div class="botoes">
        <button class="btn" style="background:rgba(255,255,255,.14);color:#d4edda;box-shadow:none" onclick="baixarLista()">⬇️ Baixar</button>
        <button class="btn" style="background:var(--amber);color:#3a1800;box-shadow:0 2px 10px rgba(213,132,26,.4)" onclick="finalizarCompra()">✓ Finalizar</button>
      </div></div>`;
  html+=`</div>`; // close lista-inner
  c.innerHTML=html;
}
function marcarItem(idx){ carrinho[idx].marcado=!carrinho[idx].marcado; renderLista(); }
function mudarQtd(idx,d){ carrinho[idx].qtd+=d; if(carrinho[idx].qtd<=0) carrinho.splice(idx,1); telaCliente(); }
function removerItem(idx){ carrinho.splice(idx,1); telaCliente(); }
function limparLista(){ if(!carrinho.length)return; confirmar("Limpar lista","Remove todos os itens da lista atual.",async()=>{carrinho=[];telaCliente();},"Limpar"); }

function baixarLista(){
  if(!carrinho.length) return toast("Lista vazia.",true);
  const data=new Date().toLocaleDateString("pt-BR");
  let txt=`LISTA DE COMPRAS — Cesta\nCliente: ${sessao.nome}\nData: ${data}\n`+"=".repeat(40)+"\n\n";
  const grupos={}; carrinho.forEach(i=>{(grupos[i.mercadoNome]??=[]).push(i);});
  let total=0;
  for(const [merc,itens] of Object.entries(grupos)){
    txt+=`${merc||"Loja"}\n`;
    for(const i of itens){ const sub=i.preco*i.qtd; total+=sub; txt+=`  [${i.marcado?"x":" "}] ${i.qtd}x ${i.nome}  —  ${reais(sub)}\n`; }
    txt+="\n";
  }
  txt+="=".repeat(40)+`\nTOTAL ESTIMADO: ${reais(total)}\n`;
  const blob=new Blob([txt],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download=`lista-compras-${data.replace(/\//g,"-")}.txt`; a.click(); URL.revokeObjectURL(url);
  toast("Lista baixada.");
}

async function finalizarCompra(){
  if(!carrinho.length) return toast("Lista vazia.",true);
  const total=carrinho.reduce((s,i)=>s+i.preco*i.qtd,0);
  const agora=Date.now();
  const grupos={};
  carrinho.forEach(i=>{ const k=i.supermercadoId||"_sem"; (grupos[k]??=[]).push(i); });

  // 1) histórico (lista completa, como antes) — melhor esforço
  try{
    await fsAdd("historico",{clienteId:sessao.id,data:new Date().toISOString(),total,
      itens:carrinho.map(i=>({nome:i.nome,emoji:i.emoji,qtd:i.qtd,preco:i.preco,mercadoNome:i.mercadoNome,supermercadoId:i.supermercadoId||null}))});
  }catch(e){ console.error("Falha ao salvar histórico:",e); }

  // 2) um pedido por supermercado (nova coleção "pedidos")
  const enviosZap=[];
  let pedidosCriados=0, semMercado=0;
  const erros=[];
  for(const [sid,itens] of Object.entries(grupos)){
    const totalGrupo=itens.reduce((s,i)=>s+i.preco*i.qtd,0);
    if(sid==="_sem"){ semMercado+=itens.length; continue; } // itens sem supermercadoId (ex.: repetidos)
    const m = cacheMercados[sid] || null;
    try{
      const pid=await fsAdd("pedidos",{
        clienteId:sessao.id, clienteNome:sessao.nome, clienteEmail:sessao.email||"", clienteTelefone:sessao.telefone||"",
        supermercadoId:sid,
        itens:itens.map(i=>({produtoId:i.produtoId||null,nome:i.nome,qtd:i.qtd,preco:i.preco,emoji:i.emoji||"🛒"})),
        total:totalGrupo, status:"aguardando", data:new Date().toISOString(), criadoEm:agora, atualizadoEm:agora
      });
      console.log("Pedido criado",pid,"→ supermercadoId:",sid,"loja:",m?m.nome:"(desconhecida)");
      pedidosCriados++;
    }catch(e){ console.error("Falha ao criar pedido para",sid,e); erros.push(e.code||e.message||String(e)); }

    if(m && m.whatsapp){
      const linhas=itens.map(i=>`• ${i.qtd}x ${i.nome} — ${reais(i.preco*i.qtd)}`).join("\n");
      const texto=`🧺 *Novo pedido — Cesta*\n*Cliente:* ${sessao.nome}\n${sessao.telefone?`*Tel:* ${sessao.telefone}\n`:""}\n*${m.nome}*\n${linhas}\n\n*Total:* ${reais(totalGrupo)}`;
      const link=zapLink(m.whatsapp,texto);
      if(link) enviosZap.push({nome:m.nome,emoji:m.emoji||"🏬",link});
    }
  }

  // se nada foi enviado e houve erro, avisa com a causa
  if(pedidosCriados===0 && erros.length){
    const permissao=erros.some(x=>/permission|insufficient/i.test(x));
    return toast(permissao
      ? "Pedido não enviado: o Firestore bloqueou a coleção 'pedidos'. Publique as regras."
      : "Pedido não enviado: "+erros[0], true);
  }

  carrinho=[];
  const avisoSem = semMercado ? `<p style="color:var(--muted);font-size:12.5px;margin-bottom:10px">⚠️ ${semMercado} item(ns) sem loja vinculada (adicionados por "Repetir") não geraram pedido. Re-adicione pela aba Comprar para enviá-los.</p>` : "";
  const corpoZap = enviosZap.length
    ? `<p style="color:var(--muted);font-size:14px;margin-bottom:12px">Envie a lista direto pelo WhatsApp da loja para agilizar o atendimento:</p>`
      + enviosZap.map(e=>`<a class="btn full" style="background:#25D366;margin-bottom:8px;display:block;text-align:center" href="${e.link}" target="_blank" rel="noopener">📲 Enviar para ${esc(e.emoji+" "+e.nome)}</a>`).join("")
    : `<p style="color:var(--muted);font-size:14px">As lojas escolhidas ainda não têm WhatsApp cadastrado, mas o pedido foi registrado e elas o verão no painel.</p>`;
  abrirModal("✅ Pedido enviado!",
    `<p style="color:var(--g1);font-size:14.5px;margin-bottom:14px">Sua lista foi enviada ao(s) supermercado(s). Você receberá a confirmação aqui no app e pode acompanhar o status na aba <b>Histórico</b>.</p>${avisoSem}${corpoZap}`,
    `<button class="btn" onclick="fecharModal()">Concluir</button>`);
  abaCliente="historico"; telaCliente();
}

function toggleHist(k){ $("#hist-"+k)?.classList.toggle("aberto"); }
function repetirCompra(k){
  const h=window.__hist?.[k]; if(!h) return;
  h.itens.forEach(it=>{
    const ex=carrinho.find(i=>i.nome===it.nome&&i.mercadoNome===it.mercadoNome);
    if(ex) ex.qtd+=it.qtd;
    else{
      // tenta recuperar o supermercadoId: do próprio histórico ou pelo nome da loja
      let sid=it.supermercadoId||null;
      if(!sid && it.mercadoNome){ const m=Object.values(cacheMercados).find(x=>x.nome===it.mercadoNome); if(m) sid=m.id; }
      const mm=sid?cacheMercados[sid]:null;
      carrinho.push({produtoId:it.produtoId||null,nome:it.nome,emoji:it.emoji,categoria:"",preco:it.preco,
        supermercadoId:sid,mercadoNome:it.mercadoNome||(mm?mm.nome:""),mercadoEmoji:mm?mm.emoji:"🏬",qtd:it.qtd,marcado:false});
    }
  });
  toast("Itens adicionados à lista atual."); abaCliente="lista"; telaCliente();
}

/* ====== ABA COMUNIDADE (ofertas enviadas por clientes) ======
   fluxo: cliente cadastra -> status "pendente" -> administrador aprova/rejeita no Gerencial
   -> quando "aprovada", a oferta fica visível para todos os clientes e pode ser comentada */
function tempoRelativo(ts){
  if(!ts) return "";
  const diff=Date.now()-ts, min=Math.floor(diff/60000), h=Math.floor(diff/3600000), d=Math.floor(diff/86400000);
  if(min<1) return "agora mesmo";
  if(min<60) return `${min} min atrás`;
  if(h<24) return `${h}h atrás`;
  if(d<7) return `${d}d atrás`;
  return new Date(ts).toLocaleDateString("pt-BR");
}

    </div>

/* converte texto de preço (ex.: "9,90", "1.299,00", "R$ 12.50") em número */
function parseValor(s){
  if(s==null) return null;
  s=String(s).trim().replace(/[R$\s]/gi,"");
  if(!s) return null;
  if(s.includes(",")) s=s.replace(/\./g,"").replace(",",".");
  const n=parseFloat(s);
  return isNaN(n)?null:n;
}

async function enviarOfertaComunidade(){
  const titulo=$("#oc-titulo").value.trim(), descricao=$("#oc-desc").value.trim();
  const validade=$("#oc-val").value.trim();
  const preco=parseValor($("#oc-preco").value);
  const precoDe=parseValor($("#oc-precoDe").value);
  const fotos=window._ocFotos||[];
  const editId=window._ocEditId||null;
  if(!titulo||!descricao) return toast("Preencha título e descrição.",true);
  if(preco==null||preco<=0) return toast("Informe um valor válido para a oferta.",true);
  if(precoDe!=null && precoDe<=preco) return toast("O preço \"De\" deve ser maior que o valor da oferta.",true);
  $("#oc-enviar").disabled=true;
  try{
    if(editId){
      // edição -> volta para análise (pendente) e limpa decisão anterior
      await fsUpdate("ofertasComunidade",editId,{
        titulo, descricao, validade, preco, precoDe:precoDe??null,
        fotos, foto:fotos[0]||"",
        status:"pendente", motivo:"", analisadoEm:null, analisadoPor:null, editadoEm:Date.now()
      });
      toast("Oferta atualizada! Voltou para análise do administrador.");
    }else{
      await fsAdd("ofertasComunidade",{
        clienteId:sessao.id, clienteNome:sessao.nome, titulo, descricao, validade,
        preco, precoDe:precoDe??null,
        fotos, foto:fotos[0]||"", // foto legada = primeira imagem
        status:"pendente", motivo:"", prazo:"", criadoEm:Date.now(), analisadoEm:null, analisadoPor:null
      });
      toast("Oferta enviada! Você verá o status em \"Minhas ofertas enviadas\".");
    }
    window._ocEditId=null;
    fecharModal();
  }catch(e){
    console.error(e); toast("Erro ao salvar a oferta.",true); $("#oc-enviar").disabled=false;
  }
}

function editarOferta(id){
  const o=cacheComunidade.find(x=>x.id===id);
  if(!o) return toast("Oferta não encontrada.",true);
  if(o.clienteId!==sessao.id) return toast("Você só pode editar suas próprias ofertas.",true);
  abrirFormOferta(o);
}

async function excluirOferta(id){
  const o=cacheComunidade.find(x=>x.id===id);
  if(!o) return toast("Oferta não encontrada.",true);
  if(o.clienteId!==sessao.id) return toast("Você só pode excluir suas próprias ofertas.",true);
  confirmar("Excluir oferta",`Tem certeza que deseja excluir "${o.titulo}"? Essa ação não pode ser desfeita.`,async()=>{
    try{ await fsDelete("ofertasComunidade",id); toast("Oferta excluída."); }
    catch(e){ console.error(e); toast("Erro ao excluir a oferta.",true); }
  },"Excluir");
}

function comentariosHTML(ofertaId){
  const lst=cacheComentarios.filter(c=>c.ofertaId===ofertaId).sort((a,b)=>(a.criadoEm||0)-(b.criadoEm||0));
  if(!lst.length) return `<div class="sem-coment">Seja o primeiro a comentar sobre essa oferta.</div>`;
  return lst.map(c=>`<div class="coment-item"><b>${esc(c.clienteNome||"cliente")}</b><span class="coment-data">${tempoRelativo(c.criadoEm)}</span><p>${esc(c.texto)}</p></div>`).join("");
}

function abrirOferta(ofertaId){
  const o=cacheComunidade.find(x=>x.id===ofertaId); if(!o) return;
  comentandoOfertaId=ofertaId;
  const imgs=(o.fotos&&o.fotos.length)?o.fotos:(o.foto?[o.foto]:[]);
  const temPromo=(o.precoDe!=null&&o.preco!=null&&o.precoDe>o.preco);
  const off=temPromo?Math.round((1-o.preco/o.precoDe)*100):0;
  const uid="od-"+String(ofertaId).replace(/\W/g,"");
  const inicial=esc((o.clienteNome||"C").trim().charAt(0).toUpperCase()||"C");
  const n=cacheComentarios.filter(c=>c.ofertaId===ofertaId).length;

  const gal = imgs.length
    ? `<div class="od-gal">
         ${off>0?`<span class="od-badge-off">-${off}%</span>`:""}
         <div class="od-track" id="${uid}-track">${imgs.map(s=>`<img src="${esc(s)}" alt="${esc(o.titulo)}">`).join("")}</div>
         ${imgs.length>1?`<button class="od-nav prev" onclick="ocCarMove('${uid}',-1)">‹</button><button class="od-nav next" onclick="ocCarMove('${uid}',1)">›</button><div class="od-dots" id="${uid}-dots">${imgs.map((_,i)=>`<span class="${i===0?'on':''}" onclick="ocCarDot('${uid}',${i})"></span>`).join("")}</div>`:""}
       </div>`
    : `<div class="od-gal"><div class="od-sem">🏷️</div></div>`;

  const preco = (o.preco!=null)
    ? `<div class="od-precos">${temPromo?`<span class="od-de">${reais(o.precoDe)}</span>`:""}<span class="od-por">${reais(o.preco)}</span></div>${temPromo?`<div class="od-eco">Economize ${reais(o.precoDe-o.preco)} (${off}% de desconto)</div>`:""}`
    : `<div class="oc-sem-preco" style="margin-top:0">Valor não informado</div>`;

  const badges = `<div class="od-badges"><span class="od-chip com">📣 Oferta da comunidade</span>${o.validade?`<span class="od-chip val">⏱ Válido: ${esc(o.validade)}</span>`:""}</div>`;

  abrirModal(o.titulo,`
    ${gal}
    ${preco}
    ${badges}
    ${o.descricao?`<div class="od-desc">${esc(o.descricao)}</div>`:""}
    <div class="od-author">
      <span class="av">${inicial}</span>
      <div><div class="nm">${esc(o.clienteNome||"cliente")}</div><div class="dt">publicou ${tempoRelativo(o.analisadoEm||o.criadoEm)}</div></div>
    </div>
    <div class="od-sec">Comentários${n?` (${n})`:""}</div>
    <div id="lista-comentarios" class="lista-comentarios">${comentariosHTML(ofertaId)}</div>
    <div class="campo" style="margin-top:14px"><label>Seu comentário</label><textarea id="novo-coment" placeholder="O que você achou dessa oferta?"></textarea></div>
  `,`
    <button class="btn fantasma" onclick="fecharModal()">Fechar</button>
    <button class="btn" id="btn-enviar-coment">Comentar</button>
  `);
  $("#btn-enviar-coment").onclick=enviarComentario;
}
/* compatibilidade: abrir comentários abre a tela de detalhe da oferta */
function abrirComentarios(ofertaId){ return abrirOferta(ofertaId); }

async function enviarComentario(){
  const txt=$("#novo-coment").value.trim();
  if(!txt) return toast("Escreva um comentário.",true);
  const ofertaId=comentandoOfertaId;
  $("#btn-enviar-coment").disabled=true;
  try{
    await fsAdd("comentariosComunidade",{ofertaId,clienteId:sessao.id,clienteNome:sessao.nome,texto:txt,criadoEm:Date.now()});
    const campo=$("#novo-coment"); if(campo) campo.value="";
    toast("Comentário publicado.");
  }catch(e){
    console.error(e); toast("Erro ao publicar comentário.",true);
  }
  const btn=$("#btn-enviar-coment"); if(btn) btn.disabled=false;
}

/* ====== CARROSSEL / OFERTAS DO PORTAL / RODAPÉ PATROCINADO ====== */
const CAR={};
function ofertaParaCard(o){const m=cacheMercados[o.supermercadoId];return {tipo:"oferta",titulo:o.titulo,descricao:o.descricao,validade:o.validade,foto:o.foto,youtube:o.youtube,merc:m?m.nome:""};}
function patroParaCard(p){return {tipo:"patro",titulo:p.titulo,descricao:p.descricao,validade:p.validade,foto:p.foto,youtube:p.youtube,link:p.link};}
function cardCarrosselHTML(c){
  const foto=c.foto?`<div class="bg" style="background-image:url('${c.foto}')"></div>`:"";
  const tag=c.tipo==="patro"?`<span class="tagp pa">Patrocinado</span>`:`<span class="tagp of">Oferta</span>`;
  return `<div class="car-card ${c.tipo==="patro"?"patro":""} ${c.foto?"tem-foto":""}" ${c.link&&!c.youtube?`onclick="window.open('${esc(c.link)}','_blank')" style="cursor:pointer"`:""}>
    ${foto}${tag}<h4>${esc(c.titulo)}</h4><p>${esc(c.descricao||"")}</p>${c.validade?`<div class="v">${esc(c.validade)}</div>`:(c.merc?`<div class="v">${esc(c.merc)}</div>`:"")}${ytEmbed(c.youtube)}
  </div>`;
}
function montarCarrossel(nome,cards){
  const trilho=$("#"+nome+"-car"); if(!trilho) return;
  pararCarrossel(nome);
  if(!cards.length){ trilho.innerHTML=`<div class="car-card" style="opacity:.75"><h4>Sem ofertas no momento</h4><p>Volte em breve para novas promoções.</p></div>`; CAR[nome]={idx:0,n:1,timer:null}; return; }
  trilho.innerHTML=cards.map(cardCarrosselHTML).join("");
  CAR[nome]={idx:0,n:cards.length,timer:null};
  if(cards.length>1) iniciarCarrossel(nome);
}
function passoCarrossel(nome){
  const trilho=$("#"+nome+"-car"),st=CAR[nome]; if(!trilho||!st) return;
  st.idx=(st.idx+1)%st.n; const card=trilho.children[0]; if(!card) return;
  trilho.style.transform=`translateX(${-st.idx*(card.getBoundingClientRect().width+13)}px)`;
}
function iniciarCarrossel(nome){ const st=CAR[nome]; if(!st) return; pararCarrossel(nome); st.timer=setInterval(()=>passoCarrossel(nome),4200); }
function pararCarrossel(nome){ if(CAR[nome]&&CAR[nome].timer){clearInterval(CAR[nome].timer);CAR[nome].timer=null;} }
function carMover(nome,dir){
  const trilho=$("#"+nome+"-car"),st=CAR[nome]; if(!trilho||!st) return;
  st.idx=(st.idx+dir+st.n)%st.n; const card=trilho.children[0]; if(!card) return;
  trilho.style.transform=`translateX(${-st.idx*(card.getBoundingClientRect().width+13)}px)`;
  iniciarCarrossel(nome);
}
function montarPortalOfertas(){
  const ofertas=cacheOfertas.slice();
  const ultima=ofertas[ofertas.length-1];
  const hero=$("#portal-hero"); if(!hero) return;
  if(ultima){
    const m=cacheMercados[ultima.supermercadoId];
    const f=ultima.foto?`<div class="bg" style="background-image:url('${ultima.foto}')"></div>`:"";
    hero.innerHTML=`${f}<span class="et">⚡ Oferta em destaque</span><h2>${esc(ultima.titulo)}</h2><p>${esc(ultima.descricao||"")}</p>
      <div class="meta">${m?`<span>🏬 ${esc(m.nome)}</span>`:""}${ultima.validade?`<span>🗓️ ${esc(ultima.validade)}</span>`:""}</div>`;
  }else{
    hero.innerHTML=`<span class="et">🛒 Cesta</span><h2>Compre pelo melhor preço</h2><p>Monte sua lista e descubra onde comprar mais barato e mais perto de você.</p>`;
  }
  const demais=ofertas.slice(0,Math.max(0,ofertas.length-1)).reverse().map(ofertaParaCard);
  const patro=cachePatrocinados.filter(p=>p.ativo).map(patroParaCard);
  const cards=[...demais,...patro];
  const rod=$("#portal-rodape");
  if(cards.length){ rod.classList.remove("escondido"); $("#portal-car-tit").textContent=patro.length?"Mais ofertas e parceiros":"Mais ofertas"; montarCarrossel("portal",cards); }
  else rod.classList.add("escondido");
}
function montarRodapePatro(){
  const box=$("#rodape-patro"); if(!box) return;
  const patro=cachePatrocinados.filter(p=>p.ativo).map(patroParaCard);
  if(!patro.length){ box.classList.add("escondido"); box.innerHTML=""; return; }
  box.classList.remove("escondido");
  box.innerHTML=`<div class="et-rod">Patrocinado</div><div class="car-janela" style="padding-left:0;padding-right:0"><div class="car-trilho" id="app-car"></div></div>`;
  montarCarrossel("app",patro);
}

/* ====== LOCALIZAÇÃO DO CLIENTE ====== */
function atualizarLocLabel(){ const l=$("#loc-label"); if(l) l.textContent=localCliente?localCliente.label:"definir local"; }
function abrirLocal(){
  abrirModal("Sua localização",`
    <p style="color:var(--cinza);font-size:14px;margin-bottom:14px">Usamos sua localização só para mostrar os mercados mais próximos e calcular distâncias na recomendação.</p>
    <div class="loc-opt">
      <button class="btn full" id="loc-gps">📍 Usar minha localização atual</button>
      <div class="ou">— ou informe seu CEP —</div>
      <div class="campo"><input id="loc-cep" placeholder="00000-000" inputmode="numeric" maxlength="9" value="${localCliente&&localCliente.cep?esc(localCliente.cep):""}"></div>
      <button class="btn fantasma full" id="loc-cep-btn">Buscar pelo CEP</button>
    </div>
    <div id="loc-status" style="font-size:13px;margin-top:14px;text-align:center;color:var(--cinza)"></div>
  `);
  const st=$("#loc-status");
  $("#loc-gps").onclick=()=>{
    if(!navigator.geolocation){ st.textContent="Seu navegador não suporta geolocalização."; return; }
    st.textContent="Obtendo localização…";
    navigator.geolocation.getCurrentPosition(
      pos=>{ localCliente={lat:pos.coords.latitude,lng:pos.coords.longitude,label:"minha localização"}; salvarLocal(); atualizarLocLabel(); toast("Localização definida."); fecharModal(); telaCliente(); },
      ()=>{ st.textContent="Não foi possível obter sua localização. Use o CEP."; },
      {enableHighAccuracy:true,timeout:9000}
    );
  };
  $("#loc-cep-btn").onclick=async()=>{
    const cep=$("#loc-cep").value.replace(/\D/g,"");
    if(cep.length!==8){ st.textContent="CEP deve ter 8 dígitos."; return; }
    st.textContent="Buscando…";
    try{
      const r=await fetch(`https://viacep.com.br/ws/${cep}/json/`); const j=await r.json();
      if(j.erro){ st.textContent="CEP não encontrado."; return; }
      let geo=null;
      try{ const g=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=br&q=${encodeURIComponent(`${j.bairro}, ${j.localidade}, ${j.uf}, Brasil`)}`); const gj=await g.json(); if(gj.length) geo={lat:parseFloat(gj[0].lat),lng:parseFloat(gj[0].lon)}; }catch(e){}
      if(!geo){ try{ const g=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=br&q=${encodeURIComponent(`${j.localidade}, ${j.uf}, Brasil`)}`); const gj=await g.json(); if(gj.length) geo={lat:parseFloat(gj[0].lat),lng:parseFloat(gj[0].lon)}; }catch(e){} }
      if(!geo){ st.textContent="Achei o CEP, mas não a localização exata. Tente o GPS."; return; }
      localCliente={lat:geo.lat,lng:geo.lng,cep,label:`${j.bairro?j.bairro+", ":""}${j.localidade}/${j.uf}`};
      salvarLocal(); atualizarLocLabel(); toast("Localização definida."); fecharModal(); telaCliente();
    }catch(e){ st.textContent="Erro ao buscar o CEP. Tente novamente."; }
  };
}

/* ====== RECOMENDAÇÃO: melhor lugar para comprar ====== */
function calcularRecomendacao(){
  const itens=carrinho; if(!itens.length) return [];
  const resultados=Object.values(cacheMercados).map(m=>{
    const prodsLoja=cacheProdutos.filter(p=>p.supermercadoId===m.id);
    let total=0; const encontrados=[],faltando=[];
    for(const it of itens){
      const cands=prodsLoja.filter(p=>mesmaCoisa(p.nome,it.nome));
      if(cands.length){ const melhor=cands.reduce((a,b)=>precoEf(a)<=precoEf(b)?a:b); total+=precoEf(melhor)*(it.qtd||1); encontrados.push(it); }
      else faltando.push(it);
    }
    const d=distKm(localCliente,(m.lat!=null)?{lat:m.lat,lng:m.lng}:null);
    return {loja:m,total,cobertura:encontrados.length,faltando,dist:d};
  }).filter(r=>r.cobertura>0);
  resultados.sort((a,b)=>{
    if(b.cobertura!==a.cobertura) return b.cobertura-a.cobertura;
    if(a.total!==b.total) return a.total-b.total;
    if(a.dist==null&&b.dist==null) return 0; if(a.dist==null) return 1; if(b.dist==null) return -1; return a.dist-b.dist;
  });
  return resultados;
}
function recomendacaoHTML(){
  const recos=calcularRecomendacao();
  const nItensDistintos=carrinho.length;
  if(!recos.length) return `<div class="cartao" style="text-align:center;color:var(--cinza);margin-bottom:16px">Adicione produtos para ver o melhor lugar para comprar.</div>`;
  const best=recos[0];
  const completos=recos.filter(r=>r.cobertura===nItensDistintos);
  const base=completos.length?completos:recos;
  const economia=Math.max(...base.map(r=>r.total))-best.total;
  let html=`<div class="reco">
    <div class="et">🏆 Melhor lugar para comprar</div>
    <h3>${best.loja.emoji||"🏬"} ${esc(best.loja.nome)}</h3>
    <div class="cob">${best.cobertura} de ${nItensDistintos} itens disponíveis aqui${best.faltando.length?` · falta: ${best.faltando.map(f=>esc(f.nome)).join(", ")}`:""}</div>
    <div class="linhas">
      <div class="bloco"><div class="n">${reais(best.total)}</div><div class="r">total estimado</div></div>
      <div class="bloco"><div class="n">${distLabel(best.dist)}</div><div class="r">${localCliente?"distância":"defina seu local"}</div></div>
    </div>
    ${economia>0.01?`<div class="eco">💰 Economia de até <b>${reais(economia)}</b> frente ao mercado mais caro.</div>`:""}
    ${best.loja.lat!=null?`<a class="btn btn-mapa" href="https://www.google.com/maps/dir/?api=1&destination=${best.loja.lat},${best.loja.lng}" target="_blank">🗺️ Como chegar</a>`:`<button class="btn btn-mapa" onclick="abrirLocal()">📍 Definir minha localização</button>`}
  </div>`;
  if(recos.length>1){
    html+=`<div class="comp"><div class="comp-tit">Comparar mercados</div>`;
    recos.forEach((r,i)=>{
      html+=`<div class="comp-linha ${i===0?'melhor':''}">
        <div class="pos">${i===0?'🏆':i+1}</div>
        <div class="corpo"><b>${esc(r.loja.nome)}</b><div class="d">${r.cobertura}/${nItensDistintos} itens${r.faltando.length?` · falta ${r.faltando.length}`:" · completo"} · ${distLabel(r.dist)}</div></div>
        <div class="tot"><div class="v">${reais(r.total)}</div><div class="s">estimado</div></div>
      </div>`;
    });
    html+=`</div>`;
  }
  return html;
}

/* ====== Carrossel de imagens — ofertas da comunidade ====== */
function ocCarMove(uid, dir){
  const track=document.getElementById(uid+"-track");
  const dots=document.getElementById(uid+"-dots");
  if(!track) return;
  const total=track.children.length;
  let idx=parseInt(track.dataset.idx||"0")+dir;
  if(idx<0) idx=total-1;
  if(idx>=total) idx=0;
  track.dataset.idx=idx;
  track.style.transform=`translateX(-${idx*100}%)`;
  if(dots) dots.querySelectorAll("span").forEach((s,i)=>s.classList.toggle("on",i===idx));
}
function ocCarDot(uid, idx){
  const track=document.getElementById(uid+"-track");
  const dots=document.getElementById(uid+"-dots");
  if(!track) return;
  track.dataset.idx=idx;
  track.style.transform=`translateX(-${idx*100}%)`;
  if(dots) dots.querySelectorAll("span").forEach((s,i)=>s.classList.toggle("on",i===idx));
}
/* ====== Compressão de imagem (cliente) ====== */
function comprimirImagemCliente(file,maxDim=1200,q=0.82){
  return new Promise((res,rej)=>{
    if(file.size>8*1024*1024) return rej("Imagem muito grande (máx 8MB).");
    const fr=new FileReader();
    fr.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let{width:w,height:h}=img;
        if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
        else if(h>=w&&h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
        const cv=document.createElement("canvas");cv.width=w;cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        res(cv.toDataURL("image/jpeg",q));
      };
      img.onerror=()=>rej("Arquivo não é uma imagem válida.");
      img.src=fr.result;
    };
    fr.onerror=()=>rej("Falha ao ler a imagem.");
    fr.readAsDataURL(file);
  });
}

  window._ocFotos.splice(idx,1);

}
